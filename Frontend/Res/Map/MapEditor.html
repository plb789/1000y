<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>千年江湖 - 地图编辑器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Microsoft YaHei', sans-serif; 
      background: #1a1a2e;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 自定义滚动条样式 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1a202c;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #4a5568;
      border-radius: 4px;
      transition: background 0.2s;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #718096;
    }
    
    ::-webkit-scrollbar-corner {
      background: #1a202c;
    }
    
    /* 工具栏 */
    #toolbar {
      height: 50px;
      background: linear-gradient(180deg, #2d3748 0%, #1a202c 100%);
      border-bottom: 2px solid #4a5568;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 10px;
    }
    
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px;
      border-right: 1px solid #4a5568;
    }
    
    .toolbar-group:last-child { border-right: none; }
    
    .toolbar-btn {
      width: 36px;
      height: 36px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    
    .toolbar-btn:hover {
      background: #4a5568;
      border-color: #e94560;
    }
    
    .toolbar-btn.active {
      background: #e94560;
      border-color: #e94560;
    }
    
    .toolbar-label {
      color: #a0aec0;
      font-size: 12px;
      margin-right: 5px;
    }
    
    .toolbar-input {
      width: 60px;
      height: 28px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 4px;
      color: #fff;
      text-align: center;
      font-size: 14px;
    }
    
    .toolbar-input:focus {
      outline: none;
      border-color: #e94560;
    }
    
    /* 主区域 */
    #main {
      display: flex;
      height: calc(100vh - 50px - 28px);
    }
    
    /* 左侧调色板 */
    #palette {
      width: 200px;
      background: #1a202c;
      border-right: 2px solid #4a5568;
      display: flex;
      flex-direction: column;
    }
    
    .palette-title {
      padding: 10px;
      background: #2d3748;
      font-size: 14px;
      font-weight: bold;
      border-bottom: 1px solid #4a5568;
    }
    
    .palette-grid {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      align-content: start;
    }
    
    .palette-tile {
      width: 40px;
      height: 40px;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    
    .palette-tile:hover {
      border-color: #fff;
      transform: scale(1.1);
    }
    
    .palette-tile.selected {
      border-color: #e94560;
      box-shadow: 0 0 8px rgba(233, 69, 96, 0.5);
    }
    
    .tile-info {
      padding: 8px;
      background: #2d3748;
      font-size: 12px;
      border-top: 1px solid #4a5568;
    }
    
    .tile-info-row {
      display: flex;
      justify-content: space-between;
      margin: 3px 0;
    }
    
    .tile-info-label { color: #a0aec0; }
    .tile-info-value { color: #4ade80; }
    
    /* 地图画布区域 */
    #canvas-container {
      flex: 1;
      background: #0d1117;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      position: relative;
    }
    
    #canvas-wrapper {
      display: inline-block;
      position: relative;
    }
    
    #mapCanvas {
      background: #16213e;
      cursor: crosshair;
      image-rendering: pixelated;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      pointer-events: auto;
    }
    
    /* 右侧面板 */
    #right-panel {
      width: 220px;
      background: #1a202c;
      border-left: 2px solid #4a5568;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    
    .panel-section {
      padding: 10px;
      border-bottom: 1px solid #4a5568;
    }
    
    .panel-title {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #e94560;
    }
    
    .panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 6px 0;
      gap: 8px;
    }
    
    .panel-label {
      font-size: 12px;
      color: #a0aec0;
      flex-shrink: 0;
      white-space: nowrap;
    }
    
    .panel-value {
      font-size: 12px;
      color: #4ade80;
      font-weight: bold;
      flex-shrink: 0;
      min-width: 30px;
      text-align: right;
    }
    
    .panel-input {
      flex: 1;
      height: 26px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 4px;
      color: #fff;
      text-align: center;
      font-size: 13px;
    }
    
    .panel-input:focus {
      outline: none;
      border-color: #e94560;
    }
    
    .panel-btn {
      width: 100%;
      height: 32px;
      background: linear-gradient(135deg, #e94560, #c53030);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
      transition: all 0.2s;
    }
    
    .panel-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
    }
    
    .panel-btn.secondary {
      background: linear-gradient(135deg, #4a5568, #2d3748);
    }
    
    /* 图层控制 */
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #2d3748;
      border-radius: 4px;
      margin: 4px 0;
      cursor: pointer;
    }
    
    .layer-item:hover {
      background: #4a5568;
    }
    
    .layer-item.active {
      background: #4a5568;
      border: 1px solid #e94560;
    }
    
    .layer-checkbox {
      width: 16px;
      height: 16px;
    }
    
    /* 分类标签 */
    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px;
      border-bottom: 1px solid #4a5568;
      margin-bottom: 8px;
    }
    
    .category-btn {
      padding: 4px 8px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 4px;
      color: #a0aec0;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .category-btn:hover {
      background: #4a5568;
      color: #fff;
    }
    
    .category-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }
    
    /* 缩放控制 */
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .zoom-value {
      font-size: 12px;
      color: #4ade80;
      min-width: 45px;
      text-align: center;
    }
    
    /* 状态栏 */
    #statusbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: #1a202c;
      border-top: 1px solid #4a5568;
      display: flex;
      align-items: center;
      padding: 0 15px;
      font-size: 12px;
      color: #a0aec0;
      gap: 20px;
    }
    
    .status-item {
      display: flex;
      gap: 5px;
    }
    
    .status-value {
      color: #4ade80;
    }
    
    /* 快捷键提示 */
    .shortcut-hint {
      font-size: 10px;
      color: #718096;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <!-- 顶部工具栏 -->
  <div id="toolbar">
    <div class="toolbar-group">
      <span class="toolbar-label">文件</span>
      <button class="toolbar-btn" id="btnNew" title="新建地图">📋</button>
      <button class="toolbar-btn" id="btnOpen" title="打开地图">📂</button>
      <button class="toolbar-btn" id="btnSave" title="保存地图">💾</button>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">工具</span>
      <button class="toolbar-btn" id="btnPen" title="画笔 [B]">✏️</button>
      <button class="toolbar-btn" id="btnEraser" title="橡皮擦 [E]">🧹</button>
      <button class="toolbar-btn" id="btnFill" title="填充 [G]">🪣</button>
      <button class="toolbar-btn" id="btnPicker" title="查看/拾取 [I] - 点击只选择不修改">👁️</button>
      <button class="toolbar-btn" id="btnSelect" title="框选 [S]">⬚</button>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">撤销</span>
      <button class="toolbar-btn" id="btnUndo" title="撤销 [Ctrl+Z]">↩️</button>
      <button class="toolbar-btn" id="btnRedo" title="重做 [Ctrl+Y]">↪️</button>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">缩放</span>
      <div class="zoom-controls">
        <button class="toolbar-btn" id="btnZoomOut">➖</button>
        <span class="zoom-value" id="zoomValue">100%</span>
        <button class="toolbar-btn" id="btnZoomIn">➕</button>
      </div>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">地图</span>
      <span class="toolbar-label">宽</span>
      <input type="number" class="toolbar-input" id="mapWidth" value="20" min="5" max="200">
      <span class="toolbar-label">高</span>
      <input type="number" class="toolbar-input" id="mapHeight" value="15" min="5" max="200">
      <button class="toolbar-btn" id="btnResize" title="调整大小">🔄</button>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">图集</span>
      <button class="toolbar-btn" id="btnLoadTileset" title="加载PNG/JPG图集">🖼️</button>
      <button class="toolbar-btn" id="btnImportDDS" title="导入原版DDS贴图">📦</button>
      <span class="toolbar-label" id="tilesetStatus">未加载</span>
      <button class="toolbar-btn" id="btnLoadMetadata" title="加载瓦片元数据JSON" style="font-size:10px;padding:2px 6px;">📋</button>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">导入</span>
      <button class="toolbar-btn" id="btnImportMap" title="导入原版.map文件">🗺️</button>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">高级</span>
      <button class="toolbar-btn" id="btnAutoGenerate" title="根据图集自动生成地图">✨</button>
      <button class="toolbar-btn" id="btnClearMap" title="清空地图瓦片数据（重新开始）">🗑️</button>
      <button class="toolbar-btn" id="btnExportMinimap" title="导出小地图PNG">🗾</button>
      <button class="toolbar-btn" id="btnExportAnim" title="导出游戏动画数据">🎮</button>
    </div>
  </div>
  
  <!-- 主区域 -->
  <div id="main">
    <!-- 左侧调色板 -->
    <div id="palette">
      <div class="palette-title">瓦片调色板</div>
      <div class="category-tabs">
        <button class="category-btn active" data-category="all">全部</button>
        <button class="category-btn" data-category="ground">地面</button>
        <button class="category-btn" data-category="water">水域</button>
        <button class="category-btn" data-category="plants">植物</button>
        <button class="category-btn" data-category="walls">墙壁</button>
        <button class="category-btn" data-category="roads">道路</button>
      </div>
      <div class="palette-grid" id="paletteGrid"></div>
      <div class="tile-info">
        <div class="tile-info-row">
          <span class="tile-info-label">当前瓦片:</span>
          <span class="tile-info-value" id="currentTile">草地 (0,0)</span>
        </div>
        <div class="tile-info-row">
          <span class="tile-info-label">通行:</span>
          <span class="tile-info-value" id="tilePassable">是</span>
        </div>
      </div>
    </div>
    
    <!-- 地图画布 -->
    <div id="canvas-container">
      <div id="canvas-wrapper">
        <canvas id="mapCanvas"></canvas>
      </div>
    </div>
    
    <!-- 右侧面板 -->
    <div id="right-panel">
      <div class="panel-section">
        <div class="panel-title">地图属性</div>
        <div class="panel-row">
          <span class="panel-label">地图ID</span>
          <input type="number" class="panel-input" id="mapId" value="1" min="1">
        </div>
        <div class="panel-row">
          <span class="panel-label">地图名</span>
          <input type="text" class="panel-input" id="mapName" value="新手村">
        </div>
        <button class="panel-btn" id="btnApplyProps">应用属性</button>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">图块属性</div>
        <div class="panel-row">
          <span class="panel-label">通行</span>
          <input type="checkbox" class="layer-checkbox" id="tilePassableCheck" checked>
        </div>
        <div class="panel-row">
          <span class="panel-label">层级</span>
          <select class="panel-input" id="tileLayer">
            <option value="0">地面</option>
            <option value="1">物体</option>
          </select>
        </div>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">瓦片属性编辑器</div>
        <div class="panel-row">
          <span class="panel-label">瓦片ID</span>
          <input type="number" class="panel-input" id="tileId" value="1" min="0" max="255">
        </div>
        <div class="panel-row">
          <span class="panel-label">高层ID</span>
          <input type="number" class="panel-input" id="tileHigh" value="0" min="0" max="255">
        </div>
        <div class="panel-row">
          <span class="panel-label">通行</span>
          <input type="checkbox" class="layer-checkbox" id="tileAttrPassable" checked>
        </div>
        <div class="panel-row">
          <span class="panel-label">阻挡</span>
          <input type="checkbox" class="layer-checkbox" id="tileAttrBlock">
        </div>
        <button class="panel-btn" id="btnApplyTileProps">应用到选区</button>
        <button class="panel-btn secondary" id="btnFillArea">填充区域</button>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">动画效果</div>
        <div class="panel-row">
          <span class="panel-label">动画类型</span>
          <select class="panel-input" id="animationType">
            <option value="">无动画</option>
            <optgroup label="自然效果">
              <option value="fire">🔥 火焰</option>
              <option value="water">💧 水流</option>
              <option value="waterfall">💦 瀑布</option>
              <option value="grass_wind">🌾 草地风吹</option>
              <option value="snow">❄️ 雪花飘落</option>
            </optgroup>
            <optgroup label="植物效果">
              <option value="tree">🌲 树木摆动</option>
              <option value="flower">🌸 花朵摇摆</option>
              <option value="mushroom">🍄 蘑菇呼吸</option>
            </optgroup>
            <optgroup label="光源效果">
              <option value="torch">🔦 火把</option>
              <option value="candle">🕯️ 蜡烛燃烧</option>
              <option value="smoke">💨 烟雾</option>
              <option value="steam">♨️ 蒸汽</option>
            </optgroup>
            <optgroup label="魔法效果">
              <option value="magic_circle">✨ 魔法阵</option>
              <option value="lightning">⚡ 闪电</option>
              <option value="gem">💎 宝石闪烁</option>
            </optgroup>
            <optgroup label="生物效果">
              <option value="insect">🐛 虫子爬行</option>
            </optgroup>
            <optgroup label="装饰效果">
              <option value="flag">🚩 旗帜飘动</option>
            </optgroup>
          </select>
        </div>
        <div class="panel-row">
          <span class="panel-label">动画速度</span>
          <input type="range" class="panel-input" id="animationSpeed" min="0.5" max="2" step="0.1" value="1">
          <span class="panel-value" id="animationSpeedValue">1.0x</span>
        </div>
        <div class="panel-row">
          <span class="panel-label">触发器</span>
          <select class="panel-input" id="triggerType">
            <option value="none">无触发器</option>
            <option value="proximity">靠近触发</option>
            <option value="time">定时触发</option>
            <option value="event">事件触发</option>
          </select>
        </div>
        <div class="panel-row">
          <span class="panel-label">音效同步</span>
          <input type="checkbox" class="layer-checkbox" id="enableSoundSync">
        </div>
        <button class="panel-btn" id="btnAddAnimation">添加动画到选区</button>
        <button class="panel-btn secondary" id="btnRemoveAnimation">移除动画</button>
        <button class="panel-btn secondary" id="btnPreviewAnimation">预览动画</button>
        <button class="panel-btn secondary" id="btnExportAnimations">导出动画数据</button>
        <div class="panel-row">
          <span class="panel-label">动画数量:</span>
          <span class="panel-value" id="animationCount">0</span>
        </div>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">高级编辑</div>
        <div class="panel-row">
          <span class="panel-label">选择区域:</span>
          <span class="panel-value" id="selectionSize">0 x 0</span>
        </div>
        <button class="panel-btn secondary" id="btnCopy">📋 复制</button>
        <button class="panel-btn secondary" id="btnPaste">📄 粘贴</button>
        <button class="panel-btn secondary" id="btnCut">✂️ 剪切</button>
        <button class="panel-btn secondary" id="btnRotate90">🔄 旋转90°</button>
        <button class="panel-btn secondary" id="btnFlipH">↔️ 水平翻转</button>
        <button class="panel-btn secondary" id="btnFlipV">↕️ 垂直翻转</button>
        <button class="panel-btn secondary" id="btnClearArea">🗑️ 清除区域</button>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">预设瓦片</div>
        <button class="panel-btn secondary" id="btnAddGrass">🌿 草地</button>
        <button class="panel-btn secondary" id="btnAddWater">🌊 水域</button>
        <button class="panel-btn secondary" id="btnAddWall">🧱 墙壁</button>
        <button class="panel-btn secondary" id="btnAddFloor">🟫 地板</button>
        <button class="panel-btn secondary" id="btnAddTree">🌲 树木</button>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">导出</div>
        <button class="panel-btn" id="btnExportBinary">导出二进制</button>
        <button class="panel-btn secondary" id="btnExportJson">导出JSON</button>
        <button class="panel-btn" id="btnExportMillennium">导出原版格式</button>
        <button class="panel-btn secondary" id="btnBatchExport">批量导出</button>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">测试功能</div>
        <button class="panel-btn" onclick="alert('✓ 按钮绑定正常！')">测试按钮</button>
        <button class="panel-btn secondary" onclick="console.log('面板:', document.getElementById('right-panel'))">检查面板</button>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">批量导入</div>
        <button class="panel-btn" id="btnBatchImport">导入多个地图</button>
        <div class="panel-row">
          <span class="panel-label">已导入:</span>
          <span class="panel-value" id="importedCount">0</span>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 状态栏 -->
  <div id="statusbar">
    <div class="status-item">光标: <span class="status-value" id="statusPos">0, 0</span></div>
    <div class="status-item">地图: <span class="status-value" id="statusSize">20 x 15</span></div>
    <div class="status-item">工具: <span class="status-value" id="statusTool">画笔</span></div>
    <div class="status-item">修改: <span class="status-value" id="statusModified">否</span></div>
  </div>

  <script src="../../ResourceLoad/ResourceManager.js"></script>
    <script src="../../ResourceLoad/MillenniumImporter.js"></script>
    <script src="../../GameLogic/Map/TileDefinitions.js"></script>
    <script src="../../GameLogic/Map/MapAnimationSystem.js"></script>
    <script src="../../GameLogic/Map/AnimationTriggerSystem.js"></script>
    <script src="../../GameLogic/Map/AnimationAudioSystem.js"></script>
    <script src="../../GameLogic/Map/AnimationEventSystem.js"></script>
    <script src="../../GameLogic/Map/WebGLAnimationRenderer.js"></script>
    
    <script>
    // ============================================
    // 千年江湖 - 地图编辑器
    // ============================================
    
    class MapEditor {
      constructor() {
        // 地图数据
        this.mapWidth = 20;
        this.mapHeight = 15;
        this.tiles = []; // [y][x] = { low, high, attr }
        this.tileSize = 48; // 像素大小（与服务端配置一致）
        
        // 编辑状态
        this.currentTool = 'pen';

      // 初始化地图数据（默认空瓦片，low=0 表示空白）
      initMap() {
        this.tiles = [];
        for (let y = 0; y < this.mapHeight; y++) {
          const row = [];
          for (let x = 0; x < this.mapWidth; x++) {
            row.push({ low: 0, high: 0, attr: 0 });
          }
          this.tiles.push(row);
        }
        this.saveHistory();

      // 初始化调色板
      initPalette() {
        const grid = document.getElementById('paletteGrid');
        grid.innerHTML = '';
        
        // 确定要显示的瓦片列表
        let tilesToShow = [];
        
        if (this.tileset && this.tilesetMetadata && this.tilesetMetadata.tiles) {
          // 使用元数据定义的瓦片
          tilesToShow = this.tilesetMetadata.tiles;
        } else if (this.tileset) {
          // 有图集但无元数据，根据图集尺寸计算瓦片数
          const tileCount = Math.floor(this.tileset.width / this.tileSize) * 
                           Math.floor(this.tileset.height / this.tileSize);
          for (let i = 1; i <= tileCount; i++) {
            tilesToShow.push({ id: i, name: `瓦片${i}`, passable: true, attr: 0, layer: 0, category: 'ground' });
          }
        } else {
          // 没有图集，使用预设瓦片类型
          tilesToShow = this.tileTypes;
        }
        
        // 根据分类筛选瓦片
        if (this.currentCategory && this.currentCategory !== 'all') {
          tilesToShow = tilesToShow.filter(tile => {
            // 获取瓦片的分类，如果没有则根据属性推断
            let tileCategory = tile.category;
            
            // 如果没有明确的category字段，根据passable和layer属性推断分类
            if (!tileCategory) {
              const passable = tile.passable !== undefined ? tile.passable : (tile.attr === 0);
              const layer = tile.layer !== undefined ? tile.layer : 0;
              
              if (passable && layer === 0) {
                tileCategory = 'ground';  // 地面：可通行且在地面层
              } else if (!passable && layer === 0) {
                tileCategory = 'water';   // 水域：不可通行且在地面层
              } else if (!passable && layer === 1) {
                tileCategory = 'walls';   // 墙壁：不可通行且在物体层
              } else if (passable && layer === 1) {
                tileCategory = 'plants';  // 植物：可通行且在物体层
              } else {
                tileCategory = 'ground';  // 默认
              }
            }
            
            return tileCategory === this.currentCategory;
          });
        }
        
        tilesToShow.forEach((tile, index) => {
          const div = document.createElement('div');
          div.className = 'palette-tile';
          if (index === 0) div.classList.add('selected');
          
          // 计算通行属性
          // attr字段有最高优先级（千年游戏标准）
          const isBlocking = tile.attr === 1;
          const isPassable = !isBlocking;
          
          div.title = `${tile.name || '瓦片' + (tile.id || index + 1)}${isBlocking ? ' [阻挡]' : ' [可通行]'}${tile.layer === 1 ? ' [物体层]' : ''}`;
          
          // 如果有瓦片图集，使用图集渲染调色板
          if (this.tileset) {
            const canvas = document.createElement('canvas');
            canvas.width = 40;
            canvas.height = 40;
            const ctx = canvas.getContext('2d');
            const ts = this.tileSize;
            const tileIndex = tile.id || (index + 1);
            const sx = ((tileIndex - 1) % this.tilesetCols) * ts;
            const sy = Math.floor((tileIndex - 1) / this.tilesetCols) * ts;
            
            // 确保不超出图集范围
            if (sx + ts <= this.tileset.width && sy + ts <= this.tileset.height) {
              ctx.drawImage(this.tileset, sx, sy, ts, ts, 0, 0, 40, 40);
            } else {
              // 瓦片超出范围，显示占位符
              ctx.fillStyle = '#2d3748';
              ctx.fillRect(0, 0, 40, 40);
              ctx.fillStyle = '#718096';
              ctx.font = '10px Arial';
              ctx.textAlign = 'center';
              ctx.fillText(tile.id || index + 1, 20, 24);
            }
            div.appendChild(canvas);
            
            // 如果是阻挡瓦片，添加红色X标记
            if (isBlocking) {
              const overlay = document.createElement('div');
              overlay.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,0,0,0.3);display:flex;align-items:center;justify-content:center;';
              overlay.innerHTML = '<span style="color:#ff4444;font-weight:bold;font-size:20px;">X</span>';
              div.style.position = 'relative';
              div.appendChild(overlay);
            }
          } else {
            div.style.backgroundColor = tile.color || '#8b7355';
            if (tile.icon) {
              div.textContent = tile.icon;
              div.style.fontSize = '20px';
            }
          }
          
          div.addEventListener('click', () => {
            document.querySelectorAll('.palette-tile').forEach(t => t.classList.remove('selected'));
            div.classList.add('selected');
            // 深拷贝瓦片数据
            this.currentTile = { 
              low: tile.id || (index + 1), 
              high: tile.layer === 1 ? 1 : 0, 
              attr: isBlocking ? 1 : 0 
            };
            this.updateTileInfo();
            console.log('选中瓦片:', tile.name, this.currentTile, '通行:', isPassable);
          });
          
          grid.appendChild(div);
        });
        
        this.updateTileInfo();
      }

      // 加载瓦片图集
      async loadTileset() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.png,.jpg,.jpeg';

        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          try {
            const status = document.getElementById('tilesetStatus');
            status.textContent = '加载中...';
            status.style.color = '#fbbf24';

            // 保存文件名（去掉扩展名）用于加载JSON元数据
            const tilesetName = file.name.replace(/\.(png|jpg|jpeg|gif|webp)$/i, '');
            this.tilesetName = tilesetName;

            // 直接用原生 Image 加载（确保 width/height 正确）
            const imgUrl = URL.createObjectURL(file);
            const img = await new Promise((resolve, reject) => {
              const image = new Image();
              image.onload = () => resolve(image);
              image.onerror = reject;
              image.src = imgUrl;
            });

            this.tileset = img;

            console.log(`📷 图集图片加载: ${img.width}x${img.height}, 文件名: ${tilesetName}`);

            // 自动弹窗让用户选择对应的 JSON 元数据文件
            // 此时还在用户点击 onchange 同步上下文中，可以正常弹文件选择框
            const jsonInput = document.createElement('input');
            jsonInput.type = 'file';
            jsonInput.accept = '.json';

            jsonInput.onchange = async (je) => {
              const jsonFile = je.target.files[0];
              if (jsonFile) {
                try {
                  const text = await this.readFileAsText(jsonFile);
                  const metadata = JSON.parse(text);

                  if (metadata.tiles && metadata.tileWidth) {
                    this.tilesetMetadata = metadata;
                    this.updateTileTypeIndexFromMetadata();
                    console.log(`✅ 元数据加载成功: ${metadata.name || jsonFile.name}`);
                  } else {
                    console.log('⚠️ JSON结构不完整，使用默认属性');
                  }
                } catch (err) {
                  console.log('⚠️ JSON解析失败:', err.message);
                }
              }

              // 最终确定图集列数
              if (this.tilesetMetadata && this.tilesetMetadata.columns > 0) {
                this.tilesetCols = this.tilesetMetadata.columns;
                console.log(`📐 使用元数据的图集列数: ${this.tilesetCols}`);
              } else if (img.width > 0 && img.height > 0) {
                this.tilesetCols = Math.round(img.width / this.tileSize);
                console.log(`⚠️ 无元数据，按图片宽度推断列数: ${this.tilesetCols} (${img.width}px / ${this.tileSize}px)`);
              }

              status.textContent = this.tilesetMetadata ? '已加载(有元数据)' : '已加载';
              status.style.color = '#4ade80';

              this.render();
              this.initPalette();

              console.log(`✅ 瓦片图集加载完成: ${img.width}x${img.height}, 列数=${this.tilesetCols}, 元数据=${this.tilesetMetadata ? '有' : '无'}`);
              console.log(`   💡 点击「✨」按钮可自动填充地图`);
            };

            // 弹出 JSON 文件选择框
            console.log('🔍 请选择对应的瓦片元数据 JSON 文件...');
            jsonInput.click();

          } catch (err) {
            alert('加载图片失败: ' + err.message);
            document.getElementById('tilesetStatus').textContent = '加载失败';
            document.getElementById('tilesetStatus').style.color = '#ef4444';
          }
        };

        input.click();
      }
      
      // 加载瓦片图集元数据JSON
      async loadTilesetMetadata(tilesetName) {
        try {
          // 尝试从相同路径加载JSON文件
          // 由于浏览器安全限制，我们使用一个模拟的URL来触发文件选择
          // 或者尝试从服务器加载（如果文件在服务器上）
          // 这里我们提供手动选择JSON文件的选项
          
          const jsonFile = await this.promptForJsonFile();
          if (jsonFile) {
            const text = await this.readFileAsText(jsonFile);
            this.tilesetMetadata = JSON.parse(text);
            console.log('瓦片元数据加载成功:', this.tilesetMetadata);
            
            // 用元数据更新瓦片类型索引
            this.updateTileTypeIndexFromMetadata();
            return;
          }
        } catch (err) {
          console.log('未找到元数据文件或加载失败，将使用默认属性');
        }
        
        // 如果没有元数据，检查是否有预设的元数据可用
        this.tilesetMetadata = null;
        this.rebuildTileTypeIndex();
      }

      // 手动加载瓦片元数据JSON（通过用户点击按钮触发，可正常弹文件选择框）
      manualLoadMetadata() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          try {
            const text = await this.readFileAsText(file);
            const metadata = JSON.parse(text);

            // 验证基本结构
            if (!metadata.tiles || !metadata.tileWidth) {
              alert('无效的元数据文件：缺少 tiles 或 tileWidth 字段');
              return;
            }

            this.tilesetMetadata = metadata;
            this.updateTileTypeIndexFromMetadata();

            // 更新状态显示
            const status = document.getElementById('tilesetStatus');
            status.textContent = '已加载(有元数据)';
            status.style.color = '#4ade80';

            console.log(`✅ 手动加载元数据成功: ${metadata.name || file.name}, 瓦片数=${metadata.totalTiles || '?'}, 列数=${metadata.columns || '?'}`);
            console.log(`   💡 点击「✨」按钮可自动填充地图`);

            this.render();
            this.initPalette();

          } catch (err) {
            alert('解析元数据失败: ' + err.message);
          }
        };
        input.click();
      }
      
      // 提示用户选择JSON文件（静默模式：不阻塞，找不到就跳过）
      promptForJsonFile() {
        return new Promise((resolve) => {
          // 尝试自动查找同名JSON文件（仅在服务器环境下有效）
          const jsonUrl = `Res/Map/${this.tilesetName}.json`;
          fetch(jsonUrl)
            .then(resp => {
              if (resp.ok) return resp.json();
              throw new Error('JSON文件不存在');
            })
            .then(data => {
              this.tilesetMetadata = data;
              this.updateTileTypeIndexFromMetadata();
              console.log(`✅ 自动加载元数据: ${jsonUrl}`);
              resolve(true);
            })
            .catch(() => {
              // JSON不存在或加载失败（404等），不弹选择框（Chrome会拦截）
              // 静默跳过，用户可通过「加载元数据」按钮手动加载
              console.log(`⚠️ 未找到元数据: ${jsonUrl}（可点击「加载元数据」按钮手动选择）`);
              resolve(false);
            });
        });
      }
      
      // 读取文件为文本
      readFileAsText(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = reject;
          reader.readAsText(file);
        });
      }
      
      // 从元数据更新瓦片类型索引
      updateTileTypeIndexFromMetadata() {
        if (!this.tilesetMetadata || !this.tilesetMetadata.tiles) return;

        // 从元数据读取图集列数（关键：确保瓦片正确定位）
        if (this.tilesetMetadata.columns && this.tilesetMetadata.columns > 0) {
          this.tilesetCols = this.tilesetMetadata.columns;
          console.log(`✅ 从元数据更新图集列数为: ${this.tilesetCols}`);
        }

        this.customTileTypes = this.tilesetMetadata.tiles.map(tile => ({
          id: tile.id,
          name: tile.name || `瓦片${tile.id}`,
          color: '#8b7355', // 默认颜色，会被图集图片覆盖
          // attr字段有最高优先级（千年游戏标准）
          attr: tile.attr !== undefined ? tile.attr : (tile.passable === false || tile.building ? 1 : 0),
          passable: (tile.attr !== 1) && (tile.passable !== false),
          layer: tile.layer !== undefined ? tile.layer : (tile.building ? 1 : 0),
          building: tile.building === true,
          category: tile.category || 'ground'
        }));

        // 重建瓦片类型索引
        this.tileTypeIndex = new Map();
        this.customTileTypes.forEach(tile => {
          this.tileTypeIndex.set(tile.id, tile);
        });

        console.log(`已用元数据更新瓦片类型: ${this.customTileTypes.length} 个瓦片, 图集列数=${this.tilesetCols}`);
      }
      
      // 重建瓦片类型索引（使用默认或自定义）
      rebuildTileTypeIndex() {
        // 如果有自定义瓦片类型，使用它
        if (this.customTileTypes && this.customTileTypes.length > 0) {
          this.tileTypeIndex = new Map();
          this.customTileTypes.forEach(tile => {
            this.tileTypeIndex.set(tile.id, tile);
          });
          return;
        }
        
        // 否则使用TileDefinitions或备用列表
        this.tileTypeIndex = new Map();
        if (window.TileDefinitions) {

            { id: 1, name: '草地', color: '#3a5f0b', passable: true, attr: 0, layer: 0, category: 'ground' },

            { id: 13, name: '石头', color: '#4a5568', passable: false, attr: 1, layer: 1, category: 'plants' },
            { id: 14, name: '深墙', color: '#2d3748', passable: false, attr: 1, layer: 1, category: 'walls' },
            { id: 15, name: '洞穴', color: '#1a202c', passable: true, attr: 0, layer: 0, category: 'ground' },
            { id: 16, name: '终点', color: '#e94560', passable: true, attr: 0, layer: 0, category: 'ground' }
          ];
        }
        
        this.tileTypes.forEach(tile => {
          const key = tile.id !== undefined ? tile.id : tile.low;
          this.tileTypeIndex.set(key, tile);
        });
      }
      
      // 导入原版千年地图文件
      async importMillenniumMap() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.map';
        
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          
          try {
            const mapData = await this.importer.importMap(file);
            this.loadMapData(mapData);
            this.isModified = true;
            this.updateStatus();
            alert(`成功导入地图: ${mapData.width} x ${mapData.height}`);
          } catch (err) {
            alert('导入地图失败: ' + err.message);
          }
        };
        
        input.click();
      }
      
      // 导入原版DDS贴图并转换为瓦片图集
      async importMillenniumTileset() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.dds';
        input.multiple = true;
        
        input.onchange = async (e) => {
          const files = Array.from(e.target.files);
          if (!files || files.length === 0) return;
          
          try {
            const status = document.getElementById('tilesetStatus');
            status.textContent = '转换中...';
            status.style.color = '#fbbf24';
            
            // 使用资源管理器加载DDS文件
            const ddsBuffers = await Promise.all(
              files.map(f => this.resourceManager.loadBinary(URL.createObjectURL(f)))
            );
            
            // 解析DDS并合并为瓦片图集
            const tilesetCanvas = await this.importer.importTilesetFromDDS(
              ddsBuffers.map((buf, i) => ({ buffer: buf, name: files[i].name })),
              this.tileSize,
              this.tilesetCols
            );
            
            this.tileset = tilesetCanvas;
            status.textContent = '已转换';
            status.style.color = '#4ade80';
            
            this.render();
            this.initPalette();
            
            alert(`成功转换 ${files.length} 个DDS文件为瓦片图集`);
          } catch (err) {
            alert('转换DDS失败: ' + err.message);
            document.getElementById('tilesetStatus').textContent = '转换失败';
            document.getElementById('tilesetStatus').style.color = '#ef4444';
          }
        };
        
        input.click();
      }
      
      // 加载地图数据
      loadMapData(mapData) {
        this.mapWidth = mapData.width;
        this.mapHeight = mapData.height;
        this.tiles = mapData.tiles;
        this.initCanvas();
        this.render();
        this.updateStatus();
      }
      
      // 初始化事件
      initEvents() {
        // 鼠标事件
        this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
        this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
        this.canvas.addEventListener('mouseup', () => this.onMouseUp());
        this.canvas.addEventListener('mouseleave', () => this.onMouseLeave());
        
        // 键盘事件
        document.addEventListener('keydown', (e) => this.onKeyDown(e));
        
        // 通行复选框
        document.getElementById('tilePassableCheck').addEventListener('change', (e) => {
          this.currentTile.attr = e.target.checked ? 0 : 1;
        });
      }
      
      // 渲染地图（优化版本）
      render() {
        const ctx = this.ctx;
        const ts = this.tileSize;
        const mw = this.mapWidth;
        const mh = this.mapHeight;
        
        ctx.save();
        
        // 应用缩放
        ctx.scale(this.zoom, this.zoom);
        
        // 清空画布
        const displayWidth = ctx.canvas.width / this.zoom;
        const displayHeight = ctx.canvas.height / this.zoom;
        ctx.fillStyle = '#16213e';
        ctx.fillRect(0, 0, displayWidth, displayHeight);
        
        // 批量绘制网格
        ctx.strokeStyle = '#2d3748';
        ctx.lineWidth = 0.5;
        
        ctx.beginPath();
        for (let x = 0; x <= mw; x++) {
          ctx.moveTo(x * ts, 0);
          ctx.lineTo(x * ts, mh * ts);
        }
        for (let y = 0; y <= mh; y++) {
          ctx.moveTo(0, y * ts);
          ctx.lineTo(mw * ts, y * ts);
        }
        ctx.stroke();
        
        // 绘制瓦片（优化：减少函数调用）
        if (this.tileset) {
          // 使用图集渲染
          const cols = this.tilesetCols;
          const maxTileX = this.tileset.width - ts;  // 图集最大有效x坐标
          const maxTileY = this.tileset.height - ts;  // 图集最大有效y坐标

          for (let y = 0; y < mh; y++) {
            for (let x = 0; x < mw; x++) {
              const tile = this.tiles[y] && this.tiles[y][x] ? this.tiles[y][x] : { low: 0, high: 0, attr: 0 };

              // 空瓦片(low=0)跳过绘制，显示透明/背景色
              if (!tile.low) {
                continue;
              }

              const tileIdx = tile.low - 1;
              const sx = (tileIdx % cols) * ts;
              const sy = Math.floor(tileIdx / cols) * ts;
              const px = x * ts;
              const py = y * ts;

              // 边界检查：确保源坐标在图集范围内
              if (sx >= 0 && sy >= 0 && sx <= maxTileX && sy <= maxTileY) {
                ctx.drawImage(this.tileset, sx, sy, ts, ts, px, py, ts, ts);
              } else {
                // 瓦片索引超出图集范围，绘制占位符
                ctx.fillStyle = '#2d3748';
                ctx.fillRect(px + 1, py + 1, ts - 2, ts - 2);
                ctx.fillStyle = '#718096';
                ctx.font = `${Math.max(10, ts / 4)}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText(`${tile.low || '?'}`, px + ts / 2, py + ts / 2 + 4);
              }
              
              // 绘制阻挡标记
              if (tile.attr === 1) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.fillRect(px + 1, py + 1, ts - 2, ts - 2);
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(px + 6, py + 6);
                ctx.lineTo(px + ts - 6, py + ts - 6);
                ctx.moveTo(px + ts - 6, py + 6);
                ctx.lineTo(px + 6, py + ts - 6);
                ctx.stroke();
              }
            }
          }
        } else {
          // 使用颜色块渲染
          for (let y = 0; y < mh; y++) {
            for (let x = 0; x < mw; x++) {
              const tile = this.tiles[y] && this.tiles[y][x] ? this.tiles[y][x] : { low: 0, high: 0, attr: 0 };

              // 空瓦片跳过
              if (!tile.low) continue;

              const tileType = this.tileTypeIndex.get(tile.low);
              const color = tileType ? tileType.color : '#ff00ff';
              const px = x * ts;
              const py = y * ts;
              
              ctx.fillStyle = color;
              ctx.fillRect(px + 1, py + 1, ts - 2, ts - 2);
              
              // 绘制阻挡标记
              if (tile.attr === 1) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                ctx.fillRect(px + 1, py + 1, ts - 2, ts - 2);
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(px + 6, py + 6);
                ctx.lineTo(px + ts - 6, py + ts - 6);
                ctx.moveTo(px + ts - 6, py + 6);
                ctx.lineTo(px + 6, py + ts - 6);
                ctx.stroke();
              }
            }
          }
        }
        
        // 绘制选择区域
        if (this.selection.active) {
          this.drawSelection();
        }

        // 绘制查看模式拾取位置高亮
        if (this.pickedPos && this.currentTool === 'picker') {
          const px = this.pickedPos.x * this.tileSize;
          const py = this.pickedPos.y * this.tileSize;
          this.ctx.strokeStyle = '#fbbf24';
          this.ctx.lineWidth = 3;
          this.ctx.strokeRect(px + 1, py + 1, this.tileSize - 2, this.tileSize - 2);
          // 角标记
          const c = 8;
          this.ctx.fillStyle = '#fbbf24';
          this.ctx.fillRect(px, py, c, c);
          this.ctx.fillRect(px + this.tileSize - c, py, c, c);
          this.ctx.fillRect(px, py + this.tileSize - c, c, c);
          this.ctx.fillRect(px + this.tileSize - c, py + this.tileSize - c, c, c);
        }
        
        // 渲染动画（如果在预览模式）
        if (this.isPreviewingAnimation) {
          this.animationSystem.render(ctx, ts, this.tileset);
        }
        
        ctx.restore();
      }
      
      // 绘制选择区域
      drawSelection() {
        const { startX, startY, endX, endY } = this.normalizeSelection();
        
        // 半透明蓝色填充
        this.ctx.fillStyle = 'rgba(66, 153, 225, 0.3)';
        this.ctx.fillRect(
          startX * this.tileSize,
          startY * this.tileSize,
          (endX - startX + 1) * this.tileSize,
          (endY - startY + 1) * this.tileSize
        );
        
        // 蓝色边框
        this.ctx.strokeStyle = '#4299e1';
        this.ctx.lineWidth = 2;
        this.ctx.setLineDash([5, 5]);
        this.ctx.strokeRect(
          startX * this.tileSize,
          startY * this.tileSize,
          (endX - startX + 1) * this.tileSize,
          (endY - startY + 1) * this.tileSize
        );
        this.ctx.setLineDash([]);
        
        // 更新选区大小显示
        this.updateSelectionDisplay();
      }
      
      // 绘制单个瓦片（优化版本）
      drawTile(x, y, tile) {
        // 使用索引表快速查找瓦片类型
        const tileType = this.tileTypeIndex.get(tile.low);
        const color = tileType ? tileType.color : '#ff00ff';
        
        // 调试：打印未找到的瓦片（仅开发模式）
        if (!tileType && window.DEV_MODE) {
          console.log('未找到瓦片类型:', tile.low);
        }
        
        const px = x * this.tileSize;
        const py = y * this.tileSize;
        
        // 如果有瓦片图集，使用图集渲染
        if (this.tileset) {
          const ts = this.tileSize;
          const sx = ((tile.low - 1) % this.tilesetCols) * ts;
          const sy = Math.floor((tile.low - 1) / this.tilesetCols) * ts;
          this.ctx.drawImage(
            this.tileset,
            sx, sy, ts, ts,
            px, py, ts, ts
          );
        } else {
          // 没有图集，使用颜色块
          this.ctx.fillStyle = color;
          this.ctx.fillRect(px + 1, py + 1, this.tileSize - 2, this.tileSize - 2);
        }
        
        // 绘制通行/阻挡标记
        if (tile.attr === 1) {
          this.ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
          this.ctx.fillRect(px + 1, py + 1, this.tileSize - 2, this.tileSize - 2);
          
          // X标记
          this.ctx.strokeStyle = '#ff0000';
          this.ctx.lineWidth = 2;
          this.ctx.beginPath();
          this.ctx.moveTo(px + 6, py + 6);
          this.ctx.lineTo(px + this.tileSize - 6, py + this.tileSize - 6);
          this.ctx.moveTo(px + this.tileSize - 6, py + 6);
          this.ctx.lineTo(px + 6, py + this.tileSize - 6);
          this.ctx.stroke();
        }
      }
      
      // 获取鼠标位置对应的瓦片坐标
      getTilePos(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / this.tileSize / this.zoom);
        const y = Math.floor((e.clientY - rect.top) / this.tileSize / this.zoom);
        return { x, y };
      }
      
      // 鼠标按下
      onMouseDown(e) {
        const { x, y } = this.getTilePos(e);
        if (x < 0 || y < 0 || x >= this.mapWidth || y >= this.mapHeight) return;
        
        this.isDrawing = true;
        this.lastX = x;
        this.lastY = y;
        
        console.log('鼠标按下, 工具:', this.currentTool, '当前瓦片:', this.currentTile);
        
        if (this.currentTool === 'pen') {
          this.setTile(x, y, { low: this.currentTile.low, high: this.currentTile.high, attr: this.currentTile.attr });
          this.render();
        } else if (this.currentTool === 'eraser') {
          const tileType = this.tileTypes[0]; // 草地
          this.setTile(x, y, { low: tileType.low, high: tileType.high, attr: tileType.attr });
          this.render();
        } else if (this.currentTool === 'fill') {
          this.floodFill(x, y, { ...this.currentTile });
          this.render();
        } else if (this.currentTool === 'select') {
          // 开始选择
          this.selection.startX = x;
          this.selection.startY = y;
          this.selection.endX = x;
          this.selection.endY = y;
          this.selection.active = true;
          this.render();
        } else if (this.currentTool === 'picker') {
          // 查看模式：只选中并显示信息，不修改任何内容
          this.pickTile(x, y);
        }
      }
      
      // 鼠标移动
      onMouseMove(e) {
        const { x, y } = this.getTilePos(e);
        
        // 更新状态栏
        document.getElementById('statusPos').textContent = `${x}, ${y}`;
        
        if (!this.isDrawing) return;
        if (x < 0 || y < 0 || x >= this.mapWidth || y >= this.mapHeight) return;
        
        if (this.currentTool === 'pen' && (x !== this.lastX || y !== this.lastY)) {
          // 绘制线段
          this.drawLine(this.lastX, this.lastY, x, y, { ...this.currentTile });
          this.lastX = x;
          this.lastY = y;
          this.render();
        } else if (this.currentTool === 'eraser' && (x !== this.lastX || y !== this.lastY)) {
          const tileType = this.tileTypes[0];
          this.drawLine(this.lastX, this.lastY, x, y, { low: tileType.low, high: tileType.high, attr: tileType.attr });
          this.lastX = x;
          this.lastY = y;
          this.render();
        } else if (this.currentTool === 'select') {
          // 更新选择区域
          this.selection.endX = x;
          this.selection.endY = y;
          this.render();
        }
      }
      
      // 鼠标释放
      onMouseUp() {
        if (!this.isDrawing) return;

        // 选择工具：完成选区后更新显示
        if (this.currentTool === 'select' && this.selection.active) {
          this.updateSelectionDisplay();
          console.log(`✅ 选区完成: (${this.selection.startX},${this.selection.startY}) → (${this.selection.endX},${this.selection.endY})`);
        }

        this.saveHistory();
        this.isDrawing = false;
      }
      
      // 鼠标离开
      onMouseLeave() {
        this.onMouseUp();
      }
      
      // 键盘按下
      onKeyDown(e) {
        if (e.ctrlKey && e.key === 'z') {
          e.preventDefault();
          this.undo();
        } else if (e.ctrlKey && e.key === 'y') {
          e.preventDefault();
          this.redo();
        } else if (e.key === 'b') {
          this.setTool('pen');
        } else if (e.key === 'e') {
          this.setTool('eraser');
        } else if (e.key === 'g') {
          this.setTool('fill');
        } else if (e.key === 's') {
          this.setTool('select');
        } else if (e.key === 'i') {
          this.setTool('picker');
        }
      }
      
      // 设置瓦片
      setTile(x, y, tile) {
        if (x >= 0 && y >= 0 && x < this.mapWidth && y < this.mapHeight) {
          this.tiles[y][x] = tile;
          this.isModified = true;
          document.getElementById('statusModified').textContent = '是';
        }
      }
      
      // 绘制线段 (Bresenham)
      drawLine(x0, y0, x1, y1, tile) {
        const dx = Math.abs(x1 - x0);
        const dy = Math.abs(y1 - y0);
        const sx = x0 < x1 ? 1 : -1;
        const sy = y0 < y1 ? 1 : -1;
        let err = dx - dy;
        
        while (true) {
          this.setTile(x0, y0, { ...tile });
          
          if (x0 === x1 && y0 === y1) break;
          
          const e2 = 2 * err;
          if (e2 > -dy) {
            err -= dy;
            x0 += sx;
          }
          if (e2 < dx) {
            err += dx;
            y0 += sy;
          }
        }
      }
      
      // 洪水填充
      floodFill(x, y, newTile) {
        const targetTile = { ...this.tiles[y][x] };
        if (targetTile.low === newTile.low && targetTile.high === newTile.high && targetTile.attr === newTile.attr) {
          return;
        }
        
        const stack = [{ x, y }];
        const visited = new Set();
        
        while (stack.length > 0) {
          const { x, y } = stack.pop();
          const key = `${x},${y}`;
          
          if (visited.has(key)) continue;
          if (x < 0 || y < 0 || x >= this.mapWidth || y >= this.mapHeight) continue;
          
          const tile = this.tiles[y][x];
          if (tile.low !== targetTile.low || tile.high !== targetTile.high || tile.attr !== targetTile.attr) continue;
          
          visited.add(key);
          this.setTile(x, y, { ...newTile });
          
          stack.push({ x: x + 1, y });
          stack.push({ x: x - 1, y });
          stack.push({ x, y: y + 1 });
          stack.push({ x, y: y - 1 });
        }
      }

      // 查看模式：拾取瓦片信息（只读，不修改）
      pickTile(x, y) {
        if (!this.tiles[y] || !this.tiles[y][x]) return;

        const tile = this.tiles[y][x];

        // 更新当前选中瓦片为该位置的瓦片（方便后续用画笔绘制相同内容）
        this.currentTile = { low: tile.low, high: tile.high, attr: tile.attr };

        // 更新属性面板显示
        document.getElementById('tileId').value = tile.low;
        document.getElementById('tileHigh').value = tile.high;
        document.getElementById('tileAttrPassable').checked = tile.attr !== 1;
        document.getElementById('tileAttrBlock').checked = tile.attr === 1;

        // 更新调色板高亮（如果瓦片在类型索引中存在）
        if (this.tileTypeIndex && this.tileTypeIndex.has(tile.low)) {
          const paletteGrid = document.getElementById('paletteGrid');
          if (paletteGrid) {
            document.querySelectorAll('.palette-tile').forEach(t => t.classList.remove('selected'));
            const targetTile = paletteGrid.querySelector(`[data-id="${tile.low}"]`);
            if (targetTile) targetTile.classList.add('selected');
          }
        }

        // 更新当前瓦片显示
        const currentTileEl = document.getElementById('currentTile');
        if (currentTileEl) {
          const tileInfo = this.tileTypeIndex ? this.tileTypeIndex.get(tile.low) : null;
          const name = (tileInfo && tileInfo.name) ? tileInfo.name : `瓦片${tile.low}`;
          currentTileEl.textContent = `${name} (${x},${y})`;
        }

        // 高亮当前格子（临时选区效果）
        this.pickedPos = { x, y };
        this.render();

        console.log(`👁️ 拾取瓦片 (${x},${y}): low=${tile.low}, high=${tile.high}, attr=${tile.attr}`);
      }

      // 设置工具
      setTool(tool) {
        this.currentTool = tool;
        
        document.querySelectorAll('#toolbar .toolbar-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn' + tool.charAt(0).toUpperCase() + tool.slice(1)).classList.add('active');
        
        document.getElementById('statusTool').textContent =
          tool === 'pen' ? '画笔' :
          tool === 'eraser' ? '橡皮擦' :
          tool === 'fill' ? '填充' :
          tool === 'picker' ? '查看' :
          '选择';
      }
      
      // 设置缩放
      setZoom(z) {
        this.zoom = Math.max(0.25, Math.min(4, z));
        document.getElementById('zoomValue').textContent = Math.round(this.zoom * 100) + '%';
        this.render();
      }
      
      // 根据类型设置当前瓦片
      setTileByType(index) {
        if (index >= 0 && index < this.tileTypes.length) {
          const tile = this.tileTypes[index];
          this.currentTile = { low: tile.low, high: tile.high, attr: tile.attr };
          this.updateTileInfo();
          
          // 选中的瓦片高亮
          document.querySelectorAll('.palette-tile').forEach((t, i) => {
            t.classList.toggle('selected', i === index);
          });
        }
      }
      
      // 更新瓦片信息
      updateTileInfo() {
        // 优先从自定义瓦片类型中查找
        let tileType = null;
        
        // 1. 先从自定义元数据中查找
        if (this.tilesetMetadata && this.tilesetMetadata.tiles) {
          tileType = this.tilesetMetadata.tiles.find(t => t.id === this.currentTile.low);
        }
        
        // 2. 再从customTileTypes中查找
        if (!tileType && this.customTileTypes) {
          tileType = this.customTileTypes.find(t => t.id === this.currentTile.low);
        }
        
        // 3. 最后从tileTypes中查找
        if (!tileType) {
          tileType = this.tileTypes.find(t => {
            if ('low' in t && 'high' in t) {
              return t.low === this.currentTile.low && t.high === this.currentTile.high;
            }
            if ('id' in t) {
              return t.id === this.currentTile.low;
            }
            return false;
          });
        }
        
        const tileName = tileType ? tileType.name : `瓦片${this.currentTile.low}`;
        document.getElementById('currentTile').textContent = `${tileName} (${this.currentTile.low},${this.currentTile.high})`;
        
        // 根据attr判断通行性
        const isPassable = this.currentTile.attr === 0;
        document.getElementById('tilePassable').textContent = isPassable ? '是' : '否';
        document.getElementById('tilePassableCheck').checked = isPassable;
      }
      
      // 调整地图大小
      resizeMap() {
        const newWidth = parseInt(document.getElementById('mapWidth').value) || 20;
        const newHeight = parseInt(document.getElementById('mapHeight').value) || 15;

        // 边界检查
        if (newWidth < 5 || newWidth > 200 || newHeight < 5 || newHeight > 200) {
          alert('地图尺寸必须在 5-200 之间');
          return;
        }

        const newTiles = [];
        for (let y = 0; y < newHeight; y++) {
          const row = [];
          for (let x = 0; x < newWidth; x++) {
            if (this.tiles[y] && this.tiles[y][x]) {
              // 复用已有瓦片
              row.push({ ...this.tiles[y][x] });
            } else {
              // 新增区域：默认使用瓦片ID=1（草地）
              row.push({ low: 1, high: 0, attr: 0 });
            }
          }
          newTiles.push(row);
        }

        this.mapWidth = newWidth;
        this.mapHeight = newHeight;
        this.tiles = newTiles;

        // 使用 initCanvas 重新初始化（避免直接设 width/height 导致 context 丢失）
        this.initCanvas();

        document.getElementById('statusSize').textContent = `${this.mapWidth} x ${this.mapHeight}`;
        this.saveHistory();
        this.render();

        console.log(`✅ 地图已调整大小: ${newWidth} x ${newHeight}`);

      // 新建地图
      newMap() {

        this.canvas.height = this.mapHeight * this.tileSize;

      // 打开地图
      openMap() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.map,.json';
        
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              if (file.name.endsWith('.json')) {
                this.loadFromJson(evt.target.result);
              } else {
                this.loadFromBinary(evt.target.result);
              }
            } catch (err) {
              alert('地图加载失败: ' + err.message);
            }
          };
          reader.readAsArrayBuffer(file);
        };
        
        input.click();
      }
      
      // 从二进制加载
      loadFromBinary(buffer) {
        const view = new DataView(buffer);
        let offset = 128;
        
        if (offset >= buffer.byteLength) throw new Error('文件太小');
        
        this.mapWidth = view.getUint16(offset, true);
        offset += 2;
        this.mapHeight = view.getUint16(offset, true);
        offset += 2;
        
        document.getElementById('mapWidth').value = this.mapWidth;
        document.getElementById('mapHeight').value = this.mapHeight;
        
        this.tiles = [];
        for (let y = 0; y < this.mapHeight; y++) {
          const row = [];
          for (let x = 0; x < this.mapWidth; x++) {
            if (offset + 3 > buffer.byteLength) break;
            const low = view.getUint8(offset++);
            const high = view.getUint8(offset++);
            const attr = view.getUint8(offset++);
            row.push({ low, high, attr });
          }
          this.tiles.push(row);
        }
        
        this.canvas.width = this.mapWidth * this.tileSize;
        this.canvas.height = this.mapHeight * this.tileSize;
        
        this.isModified = false;
        document.getElementById('statusModified').textContent = '否';
        document.getElementById('statusSize').textContent = `${this.mapWidth} x ${this.mapHeight}`;
        this.saveHistory();
        this.render();
      }
      
      // 从JSON加载
      loadFromJson(jsonStr) {
        const data = JSON.parse(jsonStr);
        
        this.mapWidth = data.width || 20;
        this.mapHeight = data.height || 15;
        document.getElementById('mapWidth').value = this.mapWidth;
        document.getElementById('mapHeight').value = this.mapHeight;
        document.getElementById('mapId').value = data.id || 1;
        document.getElementById('mapName').value = data.name || '';
        
        this.tiles = [];
        for (let y = 0; y < this.mapHeight; y++) {
          const row = [];
          for (let x = 0; x < this.mapWidth; x++) {
            const tile = data.tiles ? data.tiles[y] ? data.tiles[y][x] : null : null;
            if (tile) {
              row.push({ low: tile.low || 0, high: tile.high || 0, attr: tile.attr || 0 });
            } else {
              row.push({ low: 0, high: 0, attr: 0 });
            }
          }
          this.tiles.push(row);
        }
        
        this.canvas.width = this.mapWidth * this.tileSize;
        this.canvas.height = this.mapHeight * this.tileSize;
        
        this.isModified = false;
        document.getElementById('statusModified').textContent = '否';
        document.getElementById('statusSize').textContent = `${this.mapWidth} x ${this.mapHeight}`;
        this.saveHistory();
        this.render();
      }
      
      // 保存地图
      saveMap() {
        const mapId = document.getElementById('mapId').value;
        const mapName = document.getElementById('mapName').value;
        
        const mapData = {
          id: parseInt(mapId) || 1,
          name: mapName || '未命名',
          width: this.mapWidth,
          height: this.mapHeight,
          tiles: this.tiles,
          animations: this.exportAnimations()  // 包含动画数据
        };
        
        const blob = new Blob([JSON.stringify(mapData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);

        this.isModified = false;
        document.getElementById('statusModified').textContent = '否';
      }
      
      // 导出二进制格式
      exportBinary() {
        const headerSize = 128;
        const tileSize = 3;
        const buffer = new ArrayBuffer(headerSize + 2 + 2 + this.mapWidth * this.mapHeight * tileSize);
        const view = new Uint8Array(buffer);

        // 写入文件头标识
        const header = 'MAPFILE';
        for (let i = 0; i < header.length; i++) {
          view[i] = header.charCodeAt(i);
        }

        // 写入瓦片图集列数到文件头偏移 124 (uint16 LE)
        // 游戏渲染器需要此值来正确从图集中定位瓦片
        const actualTilesetCols = this.tileset && this.tileset.width > 0
          ? Math.floor(this.tileset.width / this.tileSize)
          : this.tilesetCols;
        view[124] = actualTilesetCols & 0xff;
        view[125] = (actualTilesetCols >> 8) & 0xff;

        // 写入宽高到头部的特定位置
        view[headerSize - 4] = this.mapWidth & 0xff;
        view[headerSize - 3] = (this.mapWidth >> 8) & 0xff;
        view[headerSize - 2] = this.mapHeight & 0xff;
        view[headerSize - 1] = (this.mapHeight >> 8) & 0xff;

        // 写入宽高
        view[headerSize] = this.mapWidth & 0xff;
        view[headerSize + 1] = (this.mapWidth >> 8) & 0xff;
        view[headerSize + 2] = this.mapHeight & 0xff;
        view[headerSize + 3] = (this.mapHeight >> 8) & 0xff;
        
        // 写入瓦片数据
        let offset = headerSize + 4;
        for (let y = 0; y < this.mapHeight; y++) {
          for (let x = 0; x < this.mapWidth; x++) {
            const tile = this.tiles[y][x];
            view[offset++] = tile.low;
            view[offset++] = tile.high;
            view[offset++] = tile.attr;
          }
        }
        
        const blob = new Blob([buffer]);
        const url = URL.createObjectURL(blob);
        
        const mapId = document.getElementById('mapId').value;
        const a = document.createElement('a');
        a.href = url;
        a.download = `${String(mapId).padStart(3, '0')}.map`;
        a.click();

        URL.revokeObjectURL(url);

        console.log(`✅ 二进制地图导出: ${String(mapId).padStart(3, '0')}.map`);
        console.log(`   地图尺寸: ${this.mapWidth} x ${this.mapHeight}, 瓦片图集列数: ${actualTilesetCols}`);
        console.log(`   文件头[124-125]已写入tilesetCols=${actualTilesetCols}`);
        
        // 如果没有加载外部图集，自动生成默认图集PNG
        if (!this.tileset) {
          this.exportDefaultTilesetPng(mapId);
        }
      }
      
      // 导出默认瓦片图集PNG（当没有外部图集时使用）
      exportDefaultTilesetPng(mapId) {
        // 创建图集画布
        const tilesetCanvas = document.createElement('canvas');
        const cols = this.tilesetCols; // 使用实际的图集列数（不再硬编码16）
        const rows = Math.ceil(this.tileTypes.length / cols);
        tilesetCanvas.width = cols * this.tileSize;
        tilesetCanvas.height = rows * this.tileSize;
        const ctx = tilesetCanvas.getContext('2d');
        
        // 绘制所有默认瓦片
        this.tileTypes.forEach((tile, index) => {
          const x = (index % cols) * this.tileSize;
          const y = Math.floor(index / cols) * this.tileSize;
          
          // 绘制瓦片背景色
          ctx.fillStyle = tile.color || '#8b7355';
          ctx.fillRect(x + 1, y + 1, this.tileSize - 2, this.tileSize - 2);
          
          // 如果是阻挡瓦片，添加红色边框
          if (tile.attr === 1 || !tile.passable) {
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 2, y + 2, this.tileSize - 4, this.tileSize - 4);
          }
          
          // 添加瓦片ID标记
          ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
          ctx.font = 'bold 12px Arial';
          ctx.textAlign = 'center';
          ctx.fillText((index + 1).toString(), x + this.tileSize / 2, y + this.tileSize / 2 + 4);
        });
        
        // 下载图集PNG
        const link = document.createElement('a');
        link.download = `${String(mapId).padStart(3, '0')}_tileset.png`;
        link.href = tilesetCanvas.toDataURL('image/png');
        link.click();
        
        console.log(`默认图集PNG已导出: ${cols * this.tileSize} x ${rows * this.tileSize}`);
      }
      
      // 导出JSON格式
      exportJson() {
        this.saveMap();
      }
      
      // 保存历史
      saveHistory() {
        // 移除当前位置之后的历史
        this.history = this.history.slice(0, this.historyIndex + 1);
        
        // 添加新历史
        const state = JSON.parse(JSON.stringify(this.tiles));
        this.history.push(state);
        
        // 限制历史数量
        if (this.history.length > this.maxHistory) {
          this.history.shift();
        } else {
          this.historyIndex++;
        }
      }
      
      // 撤销
      undo() {
        if (this.historyIndex > 0) {
          this.historyIndex--;
          this.tiles = JSON.parse(JSON.stringify(this.history[this.historyIndex]));
          this.render();
        }
      }
      
      // 重做
      redo() {
        if (this.historyIndex < this.history.length - 1) {
          this.historyIndex++;
          this.tiles = JSON.parse(JSON.stringify(this.history[this.historyIndex]));
          this.render();
        }
      }
      
      // 批量导入多个地图
      async batchImportMaps() {

        input.type = 'file';
        input.accept = '.map';
        input.multiple = true;
        
        input.onchange = async (e) => {
          const files = Array.from(e.target.files);
          if (!files || files.length === 0) return;
          
          try {
            const result = await this.importer.importMultipleMaps(files);
            
            if (result.success.length > 0) {
              this.importedMaps = result.success;
              document.getElementById('importedCount').textContent = result.success.length;
              alert(`成功导入 ${result.success.length} 个地图`);

              console.warn('导入错误:', result.errors);
              alert(`有 ${result.errors.length} 个地图导入失败`);
            }
          } catch (err) {
            alert('批量导入失败: ' + err.message);
          }
        };
        
        input.click();
      }
