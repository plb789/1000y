      // 应用瓦片属性到选区
      applyTileProps() {
        const tileId = parseInt(document.getElementById('tileId').value) || 1;
        const tileHigh = parseInt(document.getElementById('tileHigh').value) || 0;
        const attr = document.getElementById('tileAttrBlock').checked ? 1 : 0;
        
        if (this.selection.active) {
          const { startX, startY, endX, endY } = this.normalizeSelection();
          for (let y = startY; y <= endY; y++) {
            for (let x = startX; x <= endX; x++) {
              if (this.isValidTile(x, y)) {
                this.tiles[y][x] = { low: tileId, high: tileHigh, attr };
              }
            }
          }
        } else {
          // 如果没有选区，使用当前瓦片
          this.currentTile = { low: tileId, high: tileHigh, attr };
          this.updateTileInfo();
        }
        
        this.isModified = true;
        this.saveHistory();
        this.render();
      }
      
      // 填充区域
      fillArea() {
        if (!this.selection.active) {
          alert('请先使用选择工具框选区域');
          return;
        }
        
        const { startX, startY, endX, endY } = this.normalizeSelection();
        for (let y = startY; y <= endY; y++) {
          for (let x = startX; x <= endX; x++) {
            if (this.isValidTile(x, y)) {
              this.tiles[y][x] = { ...this.currentTile };
            }
          }
        }
        
        this.isModified = true;
        this.saveHistory();
        this.render();
      }
      
      // 复制选区
      copySelection() {
        if (!this.selection.active) {
          alert('请先使用选择工具框选区域');
          return;
        }
        
        const { startX, startY, endX, endY } = this.normalizeSelection();
        const width = endX - startX + 1;
        const height = endY - startY + 1;
        
        this.clipboard = {
          data: [],
          width,
          height
        };
        
        for (let y = startY; y <= endY; y++) {
          const row = [];
          for (let x = startX; x <= endX; x++) {
            row.push(this.isValidTile(x, y) ? { ...this.tiles[y][x] } : null);
          }
          this.clipboard.data.push(row);
        }
        
        document.getElementById('selectionSize').textContent = `${width} x ${height}`;
        alert(`已复制 ${width} x ${height} 的区域到剪贴板`);
      }
      
      // 剪切选区
      cutSelection() {
        this.copySelection();
        this.clearSelection();
      }
      
      // 粘贴
      pasteSelection() {
        if (!this.clipboard) {
          alert('剪贴板为空');
          return;
        }
        
        const startX = this.selection.startX >= 0 ? this.selection.startX : 0;
        const startY = this.selection.startY >= 0 ? this.selection.startY : 0;
        
        for (let y = 0; y < this.clipboard.height; y++) {
          for (let x = 0; x < this.clipboard.width; x++) {
            const mapX = startX + x;
            const mapY = startY + y;
            
            if (this.isValidTile(mapX, mapY) && this.clipboard.data[y] && this.clipboard.data[y][x]) {
              this.tiles[mapY][mapX] = { ...this.clipboard.data[y][x] };
            }
          }
        }
        
        this.isModified = true;
        this.saveHistory();
        this.render();
      }
      
      // 清除选区
      clearSelection() {
        if (!this.selection.active) {
          alert('请先使用选择工具框选区域');
          return;
        }
        
        const { startX, startY, endX, endY } = this.normalizeSelection();
        const emptyTile = { low: 1, high: 0, attr: 0 };
        
        for (let y = startY; y <= endY; y++) {
          for (let x = startX; x <= endX; x++) {
            if (this.isValidTile(x, y)) {
              this.tiles[y][x] = { ...emptyTile };
            }
          }
        }
        
        this.isModified = true;
        this.saveHistory();
        this.render();
      }
      
      // 旋转选区
      rotateSelection(degrees) {
        // 获取数据源：优先使用剪贴板，否则从当前选区读取
        if (!this.clipboard && !this.selection.active) {
          alert('请先使用选择工具框选区域，或先复制区域');
          return;
        }

        const hadClipboard = !!this.clipboard;  // 记录是否已有剪贴板数据
        const data = this.clipboard ? this.clipboard.data : this.getSelectionData();
        const width = this.clipboard ? this.clipboard.width : (this.selection.endX - this.selection.startX + 1);
        const height = this.clipboard ? this.clipboard.height : (this.selection.endY - this.selection.startY + 1);

        if (width <= 0 || height <= 0 || !data || data.length === 0) {
          alert('选区数据无效，请重新选择');
          return;
        }

        // 旋转90度
        const rotated = [];
        for (let x = 0; x < width; x++) {
          const newRow = [];
          for (let y = height - 1; y >= 0; y--) {
            newRow.push(data[y] && data[y][x] !== undefined ? data[y][x] : { low: 1, high: 0, attr: 0 });
          }
          rotated.push(newRow);
        }

        this.clipboard = {
          data: rotated,
          width: height,
          height: width
        };

        document.getElementById('selectionSize').textContent = `${this.clipboard.width} x ${this.clipboard.height}`;

        // 如果原来没有剪贴板（即直接从选区操作），将旋转结果写回原位置
        if (!hadClipboard && this.selection.active) {
          this.pasteSelection();
        } else {
          this.render();
        }

        console.log(`✅ 旋转90°: ${width}x${height} → ${height}x${width}`);
      }

      // 翻转选区
      flipSelection(direction) {
        if (!this.clipboard && !this.selection.active) {
          alert('请先使用选择工具框选区域，或先复制区域');
          return;
        }

        const hadClipboard = !!this.clipboard;  // 记录是否已有剪贴板数据
        const data = this.clipboard ? this.clipboard.data : this.getSelectionData();
        const width = this.clipboard ? this.clipboard.width : (this.selection.endX - this.selection.startX + 1);
        const height = this.clipboard ? this.clipboard.height : (this.selection.endY - this.selection.startY + 1);

        if (width <= 0 || height <= 0 || !data || data.length === 0) {
          alert('选区数据无效，请重新选择');
          return;
        }

        let flipped;
        if (direction === 'horizontal') {
          flipped = data.map(row => row ? [...row].reverse() : []);
        } else {
          flipped = [...data].reverse();
        }

        this.clipboard = {
          data: flipped,
          width: width,
          height: height
        };

        const dirName = direction === 'horizontal' ? '水平' : '垂直';

        // 如果原来没有剪贴板（即直接从选区操作），将翻转结果写回原位置
        if (!hadClipboard && this.selection.active) {
          this.pasteSelection();
        } else {
          this.render();
        }

        console.log(`✅ ${dirName}翻转: ${width}x${height}`);
      }
      
      // 获取选区数据
      getSelectionData() {
        const { startX, startY, endX, endY } = this.normalizeSelection();
        const data = [];
        
        for (let y = startY; y <= endY; y++) {
          const row = [];
          for (let x = startX; x <= endX; x++) {
            row.push(this.isValidTile(x, y) ? { ...this.tiles[y][x] } : null);
          }
          data.push(row);
        }
        
        return data;
      }
      
      // 标准化选区
      normalizeSelection() {
        return {
          startX: Math.min(this.selection.startX, this.selection.endX),
          startY: Math.min(this.selection.startY, this.selection.endY),
          endX: Math.max(this.selection.startX, this.selection.endX),
          endY: Math.max(this.selection.startY, this.selection.endY)
        };
      }
      
      // 检查坐标是否有效
      isValidTile(x, y) {
        return x >= 0 && x < this.mapWidth && y >= 0 && y < this.mapHeight;
      }
      
      // 更新选择区域显示
      updateSelectionDisplay() {
        if (this.selection.active) {
          const { startX, startY, endX, endY } = this.normalizeSelection();
          const width = endX - startX + 1;
          const height = endY - startY + 1;
          document.getElementById('selectionSize').textContent = `${width} x ${height}`;
        } else {
          document.getElementById('selectionSize').textContent = '0 x 0';
        }
      }
      
      // 添加动画到选区
      addAnimationToSelection() {
        const animationType = document.getElementById('animationType').value;
        if (!animationType) {
          alert('请选择动画类型');
          return;
        }
        
        const speed = parseFloat(document.getElementById('animationSpeed').value);
        
        if (this.selection.active) {
          // 添加到选区
          const { startX, startY, endX, endY } = this.normalizeSelection();
          for (let y = startY; y <= endY; y++) {
            for (let x = startX; x <= endX; x++) {
              if (this.isValidTile(x, y)) {
                const key = `${x},${y}`;
                const existingAnim = this.animationSystem.getAnimationAt(x, y);
                if (existingAnim) {
                  this.animationSystem.removeAnimation(existingAnim.id);
                }
                
                const animId = `anim_${key}_${Date.now()}`;
                this.animationSystem.addAnimation(animId, animationType, x * this.tileSize, y * this.tileSize, { speed });
                this.mapAnimations.set(key, { type: animationType, speed, x, y });
              }
            }
          }
        } else {
          // 添加到当前鼠标位置
          const x = this.lastX >= 0 ? this.lastX : 0;
          const y = this.lastY >= 0 ? this.lastY : 0;
          
          const key = `${x},${y}`;
          const existingAnim = this.animationSystem.getAnimationAt(x, y);
          if (existingAnim) {
            this.animationSystem.removeAnimation(existingAnim.id);
          }
          
          const animId = `anim_${key}_${Date.now()}`;
          this.animationSystem.addAnimation(animId, animationType, x * this.tileSize, y * this.tileSize, { speed });
          this.mapAnimations.set(key, { type: animationType, speed, x, y });
        }
        
        this.updateAnimationCount();
        alert(`已添加 ${animationType} 动画`);
      }
      
      // 移除选区的动画
      removeAnimationFromSelection() {
        if (this.selection.active) {
          const { startX, startY, endX, endY } = this.normalizeSelection();
          for (let y = startY; y <= endY; y++) {
            for (let x = startX; x <= endX; x++) {
              const key = `${x},${y}`;
              const anim = this.animationSystem.getAnimationAt(x, y);
              if (anim) {
                this.animationSystem.removeAnimation(anim.id);
                this.mapAnimations.delete(key);
              }
            }
          }
        } else {
          // 移除当前位置的动画
          const x = this.lastX >= 0 ? this.lastX : 0;
          const y = this.lastY >= 0 ? this.lastY : 0;
          const key = `${x},${y}`;
          const anim = this.animationSystem.getAnimationAt(x, y);
          if (anim) {
            this.animationSystem.removeAnimation(anim.id);
            this.mapAnimations.delete(key);
          }
        }
        
        this.updateAnimationCount();
        alert('已移除动画');
      }
      
      // 切换动画预览
      toggleAnimationPreview() {
        this.isPreviewingAnimation = !this.isPreviewingAnimation;
        
        if (this.isPreviewingAnimation) {
          this.animationSystem.start();
          document.getElementById('btnPreviewAnimation').textContent = '停止预览';
          document.getElementById('btnPreviewAnimation').classList.add('active');
          this.startAnimationLoop();
        } else {
          this.animationSystem.stop();
          document.getElementById('btnPreviewAnimation').textContent = '预览动画';
          document.getElementById('btnPreviewAnimation').classList.remove('active');
        }
        
        this.render();
      }
      
      // 启动动画渲染循环
      startAnimationLoop() {
        if (!this.isPreviewingAnimation) return;
        
        this.render();
        requestAnimationFrame(() => this.startAnimationLoop());
      }
      
      // 更新动画数量显示
      updateAnimationCount() {
        document.getElementById('animationCount').textContent = this.mapAnimations.size;
      }
      
      // 导出动画数据
      exportAnimations() {
        const animations = [];
        this.mapAnimations.forEach((anim, key) => {
          animations.push({
            x: anim.x,
            y: anim.y,
            type: anim.type,
            speed: anim.speed
          });
        });
        
        return animations;
      }
      
      // 导入动画数据
      importAnimations(animations) {
        animations.forEach(anim => {
          const key = `${anim.x},${anim.y}`;
          const animId = `anim_${key}_${Date.now()}`;
          this.animationSystem.addAnimation(animId, anim.type, anim.x * this.tileSize, anim.y * this.tileSize, { speed: anim.speed });
          this.mapAnimations.set(key, anim);
        });
        
        this.updateAnimationCount();
      }
      
      // 导出动画数据（通用）
      exportAnimationData() {
        const data = {
          animations: this.exportAnimations(),
          triggers: this.triggerSystem.exportTriggers(),
          events: this.eventSystem.exportEvents(),
          exportTime: new Date().toISOString(),
          version: '1.0'
        };
        
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `animations_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        
        alert('动画数据已导出');
      }
      
      // 导出动画数据文件（按地图ID命名，用于游戏加载）
      exportAnimationFile() {
        const mapId = document.getElementById('mapId').value;
        const animations = this.exportAnimations();
        
        const data = {
          animations: animations,
          mapId: parseInt(mapId) || 1,
          exportTime: new Date().toISOString(),
          version: '1.0'
        };
        
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${String(mapId).padStart(3, '0')}_anim.json`;
        a.click();
        URL.revokeObjectURL(url);
        
        alert(`动画数据已导出: ${String(mapId).padStart(3, '0')}_anim.json`);
      }
      
      // 切换WebGL渲染
      toggleWebGL() {
        if (!window.WebGLAnimationRenderer) {
          alert('WebGL不可用');
          return;
        }
        
        this.useWebGL = !this.useWebGL;
        
        if (this.useWebGL) {
          if (!this.webglRenderer) {
            // 创建一个新的canvas用于WebGL
            const webglCanvas = document.createElement('canvas');
            webglCanvas.id = 'webglCanvas';
            webglCanvas.width = this.canvas.width;
            webglCanvas.height = this.canvas.height;
            webglCanvas.style.position = 'absolute';
            webglCanvas.style.top = '0';
            webglCanvas.style.left = '0';
            
            // 将WebGL canvas添加到画布容器中
            document.getElementById('canvas-wrapper').appendChild(webglCanvas);
            
            this.webglRenderer = new window.WebGLAnimationRenderer(webglCanvas);
          }
          
          if (this.webglRenderer.enabled) {
            // 隐藏2D canvas
            this.canvas.style.display = 'none';
            document.getElementById('btnToggleWebGL').textContent = '🚀 禁用WebGL';
            document.getElementById('btnToggleWebGL').classList.add('active');
            console.log('WebGL渲染已启用');
          } else {
            this.useWebGL = false;
            // 清理未成功的WebGL canvas
            if (this.webglRenderer.canvas) {
              this.webglRenderer.canvas.remove();
              this.webglRenderer = null;
            }
            alert('WebGL初始化失败，可能您的浏览器不支持WebGL');
          }
        } else {
          // 显示2D canvas
          this.canvas.style.display = 'block';
          document.getElementById('btnToggleWebGL').textContent = '🚀 启用WebGL';
          document.getElementById('btnToggleWebGL').classList.remove('active');
          console.log('WebGL渲染已禁用，回退到Canvas 2D');
        }
        
        this.render();
      }
      
      // 加载图集后自动填充地图（根据元数据中的原图布局）
      autoFillMapFromTileset() {
        if (!this.tilesetMetadata || !this.tilesetMetadata.tiles) return;

        // ★ 唯一标准：始终使用图集图片的实际列数
        // 这确保：地图数据中的瓦片ID → 游戏渲染器查找图集的位置 → 完全一致
        const atlasCols = this.tileset && this.tileset.width > 0
          ? Math.round(this.tileset.width / this.tileSize)
          : (this.tilesetMetadata.columns || this.tilesetCols);

        // 地图尺寸也用 atlasCols（确保地图网格与图集网格对齐）
        const totalTiles = this.tilesetMetadata.tiles.length;
        const mapCols = atlasCols;
        const mapRows = Math.ceil(totalTiles / atlasCols);

        if (mapCols <= 0 || mapRows <= 0) {
          console.log('⚠️ 无法计算地图尺寸，跳过自动填充');
          return;
        }

        console.log(`🔄 自动填充地图:`);
        console.log(`   图集列数(atlasCols)=${mapCols} (图片宽${this.tileset?.width || '?'}px / ${this.tileSize}px)`);
        console.log(`   地图网格: ${mapCols} x ${mapRows} = ${totalTiles} 瓦片`);
        if (this.tilesetMetadata.sourceTileCols && this.tilesetMetadata.sourceTileCols !== mapCols) {
          console.log(`   ⚠️ 注意: 原图列数(${this.tilesetMetadata.sourceTileCols}) ≠ 图集列数(${mapCols})`);
          console.log(`   已自动使用图集列数作为地图宽度，确保渲染正确`);
        }

        // 保存历史
        this.saveHistory();

        // 设置地图尺寸
        this.mapWidth = mapCols;
        this.mapHeight = mapRows;

        // 更新UI输入框
        document.getElementById('mapWidth').value = mapCols;
        document.getElementById('mapHeight').value = mapRows;

        // ★ 关键：用 atlasCols 分配瓦片ID（和游戏渲染器完全一致）
        // 瓦片ID = y * atlasCols + x + 1
        // 游戏端: 位置 = ((ID-1) % atlasCols, floor((ID-1) / atlasCols))
        // 两者互逆，保证正确显示
        this.tiles = [];
        for (let y = 0; y < mapRows; y++) {
          const row = [];
          for (let x = 0; x < mapCols; x++) {
            const linearIndex = y * mapCols + x; // 0-based linear index

            // 如果超出实际瓦片数，填空瓦片
            if (linearIndex >= totalTiles) {
              row.push({ low: 0, high: 0, attr: 0 });
              continue;
            }

            const tileId = linearIndex + 1; // 1-based tile ID
            const tileInfo = this.tileTypeIndex.get(tileId);

            row.push({
              low: tileId,
              high: (tileInfo && tileInfo.layer === 1) ? 1 : 0,
              attr: (tileInfo && tileInfo.attr === 1) ? 1 : 0
            });
          }
          this.tiles.push(row);
        }

        // 同步更新 tilesetCols
        this.tilesetCols = atlasCols;

        // 重新初始化画布并渲染
        this.initCanvas();
        this.render();

        document.getElementById('statusSize').textContent = `${this.mapWidth} x ${this.mapHeight}`;

        this.isModified = true;
        document.getElementById('statusModified').textContent = '是';

        console.log(`✅ 地图已填充: ${mapCols} x ${mapRows}, 使用图集列数=${atlasCols}`);
      }

      // 清空所有瓦片数据（重新开始编辑）
      clearAllTiles() {
        if (this.mapWidth <= 0 || this.mapHeight <= 0) {
          alert('请先设置地图尺寸');
          return;
        }

        if (!confirm(`确定要清空地图吗？\n将清除全部 ${this.mapWidth}x${this.mapHeight} = ${this.mapWidth * this.mapHeight} 个格子的瓦片数据`)) {
          return;
        }

        // 清空瓦片数据
        this.tiles = [];
        for (let y = 0; y < this.mapHeight; y++) {
          const row = [];
          for (let x = 0; x < this.mapWidth; x++) {
            row.push({ low: 0, high: 0, attr: 0 });
          }
          this.tiles.push(row);
        }

        // 清空历史记录（避免撤销回到旧数据）
        this.history = [];
        this.historyIndex = -1;

        // 清除选区
        this.selection = null;
        this.clipboard = null;

        // 重新渲染
        this.render();

        // 更新状态
        this.isModified = true;
        document.getElementById('statusModified').textContent = '是';

        console.log(`🗑️ 地图已清空: ${this.mapWidth} x ${this.mapHeight}`);
      }

      autoGenerateMap() {
        if (!this.tileset || !this.tilesetMetadata) {
          alert('请先加载带有元数据的瓦片图集');
          return;
        }
        
        // 从元数据获取原图的瓦片网格尺寸
        const sourceCols = this.tilesetMetadata.sourceTileCols || this.tilesetCols;
        const sourceRows = this.tilesetMetadata.sourceTileRows || Math.ceil(this.customTileTypes.length / this.tilesetCols);
        
        if (sourceCols <= 0 || sourceRows <= 0) {
          alert('元数据中没有原图尺寸信息，请使用新版CreateTileset.html生成图集');
          return;
        }
        
        // 确认是否要重新生成地图
        const confirmMsg = `将根据图集原图布局自动生成 ${sourceCols} x ${sourceRows} 的地图，是否继续？`;
        if (!confirm(confirmMsg)) return;
        
        // 保存历史
        this.saveHistory();
        
        // 设置地图尺寸
        this.mapWidth = sourceCols;
        this.mapHeight = sourceRows;
        
        // 更新UI
        document.getElementById('mapWidth').value = sourceCols;
        document.getElementById('mapHeight').value = sourceRows;
        
        // 初始化瓦片数组（按原图顺序自动填充）
        this.tiles = [];
        for (let y = 0; y < sourceRows; y++) {
          const row = [];
          for (let x = 0; x < sourceCols; x++) {
            // 计算原图中的瓦片索引
            const sourceIndex = y * sourceCols + x;
            
            // 获取瓦片属性
            const tileInfo = this.tileTypeIndex.get(sourceIndex + 1);
            const low = sourceIndex + 1;
            const high = tileInfo && tileInfo.layer === 1 ? 1 : 0;
            // attr字段有最高优先级，这是千年游戏的标准格式
            const attr = tileInfo && tileInfo.attr === 1 ? 1 : 0;
            
            row.push({ low, high, attr });
          }
          this.tiles.push(row);
        }
        
        // 重新初始化画布
        this.initCanvas();
        this.render();
        
        this.isModified = true;
        document.getElementById('statusModified').textContent = '是';
        
        console.log(`自动生成地图完成: ${sourceCols} x ${sourceRows} 瓦片`);
        alert(`地图自动生成完成！\n尺寸: ${sourceCols} x ${sourceRows} 瓦片\n您可以在此基础上进行微调编辑。`);
      }
      
      // 导出小地图PNG
      exportMinimap() {
        if (!this.tiles || this.tiles.length === 0) {
          alert('请先创建或打开地图');
          return;
        }
        
        // 创建小地图画布（每个瓦片1像素）
        const minimapCanvas = document.createElement('canvas');
        minimapCanvas.width = this.mapWidth;
        minimapCanvas.height = this.mapHeight;
        const ctx = minimapCanvas.getContext('2d');
        
        // 定义颜色映射（基于瓦片通行属性）
        const getColor = (tile) => {
          if (!tile) return '#1a202c'; // 空白
          if (tile.attr === 1) return '#4a5568'; // 阻挡区域（灰色）
          return '#4ade80'; // 可通行区域（绿色）
        };
        
        // 绘制小地图
        for (let y = 0; y < this.mapHeight; y++) {
          for (let x = 0; x < this.mapWidth; x++) {
            ctx.fillStyle = getColor(this.tiles[y][x]);
            ctx.fillRect(x, y, 1, 1);
          }
        }
        
        // 下载（文件名格式与服务端配置一致）
        const mapId = document.getElementById('mapId').value;
        const link = document.createElement('a');
        // 服务端配置使用 minimap/xxx.png 格式
        link.download = `${String(mapId).padStart(3, '0')}_minimap.png`;
        link.href = minimapCanvas.toDataURL('image/png');
        link.click();
        
        console.log(`小地图导出完成: ${this.mapWidth} x ${this.mapHeight}`);
      }
    }
    
    // 启动编辑器
    window.addEventListener('DOMContentLoaded', () => {
      window.mapEditor = new MapEditor();
    });
  </script>
