<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>千年江湖 - 地图编辑器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Microsoft YaHei', sans-serif; 
      background: #1a1a2e;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 顶部工具栏 */
    #toolbar {
      height: 50px;
      background: linear-gradient(180deg, #2d3748 0%, #1a202c 100%);
      border-bottom: 2px solid #4a5568;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 10px;
    }
    
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px;
      border-right: 1px solid #4a5568;
    }
    
    .toolbar-group:last-child { border-right: none; }
    
    .toolbar-btn {
      width: 36px;
      height: 36px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    
    .toolbar-btn:hover {
      background: #4a5568;
      border-color: #e94560;
    }
    
    .toolbar-btn.active {
      background: #e94560;
      border-color: #e94560;
    }
    
    .toolbar-label {
      color: #a0aec0;
      font-size: 12px;
      margin-right: 5px;
    }
    
    .toolbar-input {
      width: 60px;
      height: 28px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 4px;
      color: #fff;
      text-align: center;
      font-size: 14px;
    }
    
    .toolbar-input:focus {
      outline: none;
      border-color: #e94560;
    }
    
    /* 主区域 */
    #main {
      display: flex;
      height: calc(100vh - 50px);
    }
    
    /* 左侧调色板 */
    #palette {
      width: 200px;
      background: #1a202c;
      border-right: 2px solid #4a5568;
      display: flex;
      flex-direction: column;
    }
    
    .palette-title {
      padding: 10px;
      background: #2d3748;
      font-size: 14px;
      font-weight: bold;
      border-bottom: 1px solid #4a5568;
    }
    
    .palette-grid {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      align-content: start;
    }
    
    .palette-tile {
      width: 40px;
      height: 40px;
      border: 2px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    
    .palette-tile:hover {
      border-color: #fff;
      transform: scale(1.1);
    }
    
    .palette-tile.selected {
      border-color: #e94560;
      box-shadow: 0 0 8px rgba(233, 69, 96, 0.5);
    }
    
    .tile-info {
      padding: 8px;
      background: #2d3748;
      font-size: 12px;
      border-top: 1px solid #4a5568;
    }
    
    .tile-info-row {
      display: flex;
      justify-content: space-between;
      margin: 3px 0;
    }
    
    .tile-info-label { color: #a0aec0; }
    .tile-info-value { color: #4ade80; }
    
    /* 地图画布区域 */
    #canvas-container {
      flex: 1;
      background: #0d1117;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      /* 确保没有东西遮挡 */
      pointer-events: none;
    }
    
    #mapCanvas {
      background: #16213e;
      cursor: crosshair;
      image-rendering: pixelated;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      pointer-events: auto;
    }
    
    /* 右侧面板 */
    #right-panel {
      width: 220px;
      background: #1a202c;
      border-left: 2px solid #4a5568;
      display: flex;
      flex-direction: column;
    }
    
    .panel-section {
      padding: 10px;
      border-bottom: 1px solid #4a5568;
    }
    
    .panel-title {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #e94560;
    }
    
    .panel-row {
      display: flex;
      align-items: center;
      margin: 6px 0;
      gap: 8px;
    }
    
    .panel-label {
      font-size: 12px;
      color: #a0aec0;
      width: 50px;
    }
    
    .panel-input {
      flex: 1;
      height: 26px;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 4px;
      color: #fff;
      text-align: center;
      font-size: 13px;
    }
    
    .panel-input:focus {
      outline: none;
      border-color: #e94560;
    }
    
    .panel-btn {
      width: 100%;
      height: 32px;
      background: linear-gradient(135deg, #e94560, #c53030);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
      transition: all 0.2s;
    }
    
    .panel-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
    }
    
    .panel-btn.secondary {
      background: linear-gradient(135deg, #4a5568, #2d3748);
    }
    
    /* 图层控制 */
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #2d3748;
      border-radius: 4px;
      margin: 4px 0;
      cursor: pointer;
    }
    
    .layer-item:hover {
      background: #4a5568;
    }
    
    .layer-item.active {
      background: #4a5568;
      border: 1px solid #e94560;
    }
    
    .layer-checkbox {
      width: 16px;
      height: 16px;
    }
    
    /* 缩放控制 */
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .zoom-value {
      font-size: 12px;
      color: #4ade80;
      min-width: 45px;
      text-align: center;
    }
    
    /* 状态栏 */
    #statusbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: #1a202c;
      border-top: 1px solid #4a5568;
      display: flex;
      align-items: center;
      padding: 0 15px;
      font-size: 12px;
      color: #a0aec0;
      gap: 20px;
    }
    
    .status-item {
      display: flex;
      gap: 5px;
    }
    
    .status-value {
      color: #4ade80;
    }
    
    /* 快捷键提示 */
    .shortcut-hint {
      font-size: 10px;
      color: #718096;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <!-- 顶部工具栏 -->
  <div id="toolbar">
    <div class="toolbar-group">
      <span class="toolbar-label">文件</span>
      <button class="toolbar-btn" id="btnNew" title="新建地图">📋</button>
      <button class="toolbar-btn" id="btnOpen" title="打开地图">📂</button>
      <button class="toolbar-btn" id="btnSave" title="保存地图">💾</button>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">工具</span>
      <button class="toolbar-btn active" id="btnPen" title="画笔 [B]">✏️</button>
      <button class="toolbar-btn" id="btnEraser" title="橡皮擦 [E]">🧹</button>
      <button class="toolbar-btn" id="btnFill" title="填充 [G]">🪣</button>
      <button class="toolbar-btn" id="btnSelect" title="框选 [S]">⬚</button>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">撤销</span>
      <button class="toolbar-btn" id="btnUndo" title="撤销 [Ctrl+Z]">↩️</button>
      <button class="toolbar-btn" id="btnRedo" title="重做 [Ctrl+Y]">↪️</button>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">缩放</span>
      <div class="zoom-controls">
        <button class="toolbar-btn" id="btnZoomOut">➖</button>
        <span class="zoom-value" id="zoomValue">100%</span>
        <button class="toolbar-btn" id="btnZoomIn">➕</button>
      </div>
    </div>
    
    <div class="toolbar-group">
      <span class="toolbar-label">地图</span>
      <span class="toolbar-label">宽</span>
      <input type="number" class="toolbar-input" id="mapWidth" value="20" min="5" max="200">
      <span class="toolbar-label">高</span>
      <input type="number" class="toolbar-input" id="mapHeight" value="15" min="5" max="200">
      <button class="toolbar-btn" id="btnResize" title="调整大小">🔄</button>
    </div>
  </div>
  
  <!-- 主区域 -->
  <div id="main">
    <!-- 左侧调色板 -->
    <div id="palette">
      <div class="palette-title">瓦片调色板</div>
      <div class="palette-grid" id="paletteGrid"></div>
      <div class="tile-info">
        <div class="tile-info-row">
          <span class="tile-info-label">当前瓦片:</span>
          <span class="tile-info-value" id="currentTile">草地 (0,0)</span>
        </div>
        <div class="tile-info-row">
          <span class="tile-info-label">通行:</span>
          <span class="tile-info-value" id="tilePassable">是</span>
        </div>
      </div>
    </div>
    
    <!-- 地图画布 -->
    <div id="canvas-container">
      <canvas id="mapCanvas"></canvas>
    </div>
    
    <!-- 右侧面板 -->
    <div id="right-panel">
      <div class="panel-section">
        <div class="panel-title">地图属性</div>
        <div class="panel-row">
          <span class="panel-label">地图ID</span>
          <input type="number" class="panel-input" id="mapId" value="1" min="1">
        </div>
        <div class="panel-row">
          <span class="panel-label">地图名</span>
          <input type="text" class="panel-input" id="mapName" value="新手村">
        </div>
        <button class="panel-btn" id="btnApplyProps">应用属性</button>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">图块属性</div>
        <div class="panel-row">
          <span class="panel-label">通行</span>
          <input type="checkbox" class="layer-checkbox" id="tilePassableCheck" checked>
        </div>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">预设瓦片</div>
        <button class="panel-btn secondary" id="btnAddGrass">🌿 草地</button>
        <button class="panel-btn secondary" id="btnAddWater">🌊 水域</button>
        <button class="panel-btn secondary" id="btnAddWall">🧱 墙壁</button>
        <button class="panel-btn secondary" id="btnAddFloor">🟫 地板</button>
        <button class="panel-btn secondary" id="btnAddTree">🌲 树木</button>
      </div>
      
      <div class="panel-section">
        <div class="panel-title">导出</div>
        <button class="panel-btn" id="btnExportBinary">导出二进制</button>
        <button class="panel-btn secondary" id="btnExportJson">导出JSON</button>
      </div>
    </div>
  </div>
  
  <!-- 状态栏 -->
  <div id="statusbar">
    <div class="status-item">光标: <span class="status-value" id="statusPos">0, 0</span></div>
    <div class="status-item">地图: <span class="status-value" id="statusSize">20 x 15</span></div>
    <div class="status-item">工具: <span class="status-value" id="statusTool">画笔</span></div>
    <div class="status-item">修改: <span class="status-value" id="statusModified">否</span></div>
  </div>

  <script>
    // ============================================
    // 千年江湖 - 地图编辑器
    // ============================================
    
    class MapEditor {
      constructor() {
        // 地图数据
        this.mapWidth = 20;
        this.mapHeight = 15;
        this.tiles = []; // [y][x] = { low, high, attr }
        this.tileSize = 32; // 像素大小
        
        // 编辑状态
        this.currentTool = 'pen';
        this.currentTile = { low: 1, high: 0, attr: 0 };
        this.zoom = 1;
        this.isModified = false;
        
        // 撤销/重做
        this.history = [];
        this.historyIndex = -1;
        this.maxHistory = 50;
        
        // 预设瓦片类型
        this.tileTypes = [
          { name: '草地', low: 1, high: 0, attr: 0, color: '#3a5f0b', passable: true },
          { name: '水域', low: 2, high: 0, attr: 1, color: '#1e4d8c', passable: false },
          { name: '墙壁', low: 3, high: 0, attr: 1, color: '#5c5c5c', passable: false },
          { name: '地板', low: 4, high: 0, attr: 0, color: '#8b7355', passable: true },
          { name: '树木', low: 5, high: 0, attr: 1, color: '#228b22', passable: false },
          { name: '沙地', low: 6, high: 0, attr: 0, color: '#c2b280', passable: true },
          { name: '泥土', low: 7, high: 0, attr: 0, color: '#8b4513', passable: true },
          { name: '石板路', low: 8, high: 0, attr: 0, color: '#696969', passable: true },
          { name: '楼梯', low: 9, high: 0, attr: 0, color: '#a0522d', passable: true },
          { name: '门', low: 10, high: 0, attr: 1, color: '#654321', passable: false },
          { name: '桥梁', low: 11, high: 0, attr: 0, color: '#8b7765', passable: true },
          { name: '花丛', low: 12, high: 0, attr: 0, color: '#ff69b4', passable: true },
        ];
        
        // 画布
        this.canvas = document.getElementById('mapCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        // 鼠标状态
        this.isDrawing = false;
        this.lastX = -1;
        this.lastY = -1;
        
        this.init();
      }
      
      init() {
        this.initMap();
        this.initCanvas();
        this.initPalette();
        this.initToolbar();
        this.initEvents();
        this.render();
      }
      
      // 初始化地图数据
      initMap() {
        this.tiles = [];
        for (let y = 0; y < this.mapHeight; y++) {
          const row = [];
          for (let x = 0; x < this.mapWidth; x++) {
            row.push({ low: 1, high: 0, attr: 0 });
          }
          this.tiles.push(row);
        }
        this.saveHistory();
      }
      
      // 初始化画布
      initCanvas() {
        this.canvas.width = this.mapWidth * this.tileSize;
        this.canvas.height = this.mapHeight * this.tileSize;
      }
      
      // 初始化调色板
      initPalette() {
        const grid = document.getElementById('paletteGrid');
        grid.innerHTML = '';
        
        this.tileTypes.forEach((tile, index) => {
          const div = document.createElement('div');
          div.className = 'palette-tile';
          if (index === 0) div.classList.add('selected');
          div.style.backgroundColor = tile.color;
          div.title = tile.name + (tile.attr === 1 ? ' [阻挡]' : ' [可通行]');
          div.dataset.index = index;
          
          div.addEventListener('click', () => {
            document.querySelectorAll('.palette-tile').forEach(t => t.classList.remove('selected'));
            div.classList.add('selected');
            // 深拷贝瓦片数据
            this.currentTile = { 
              low: tile.low, 
              high: tile.high, 
              attr: tile.attr 
            };
            this.updateTileInfo();
            console.log('选中瓦片:', tile.name, this.currentTile);
          });
          
          grid.appendChild(div);
        });
        
        this.updateTileInfo();
      }
      
      // 初始化工具栏
      initToolbar() {
        // 工具按钮
        document.getElementById('btnPen').addEventListener('click', () => this.setTool('pen'));
        document.getElementById('btnEraser').addEventListener('click', () => this.setTool('eraser'));
        document.getElementById('btnFill').addEventListener('click', () => this.setTool('fill'));
        document.getElementById('btnSelect').addEventListener('click', () => this.setTool('select'));
        
        // 文件操作
        document.getElementById('btnNew').addEventListener('click', () => this.newMap());
        document.getElementById('btnOpen').addEventListener('click', () => this.openMap());
        document.getElementById('btnSave').addEventListener('click', () => this.saveMap());
        
        // 撤销/重做
        document.getElementById('btnUndo').addEventListener('click', () => this.undo());
        document.getElementById('btnRedo').addEventListener('click', () => this.redo());
        
        // 缩放
        document.getElementById('btnZoomIn').addEventListener('click', () => this.setZoom(this.zoom + 0.25));
        document.getElementById('btnZoomOut').addEventListener('click', () => this.setZoom(this.zoom - 0.25));
        
        // 预设瓦片
        document.getElementById('btnAddGrass').addEventListener('click', () => this.setTileByType(0));
        document.getElementById('btnAddWater').addEventListener('click', () => this.setTileByType(1));
        document.getElementById('btnAddWall').addEventListener('click', () => this.setTileByType(2));
        document.getElementById('btnAddFloor').addEventListener('click', () => this.setTileByType(3));
        document.getElementById('btnAddTree').addEventListener('click', () => this.setTileByType(4));
        
        // 导出
        document.getElementById('btnExportBinary').addEventListener('click', () => this.exportBinary());
        document.getElementById('btnExportJson').addEventListener('click', () => this.exportJson());
        
        // 地图尺寸
        document.getElementById('btnResize').addEventListener('click', () => this.resizeMap());
      }
      
      // 初始化事件
      initEvents() {
        // 鼠标事件
        this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
        this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
        this.canvas.addEventListener('mouseup', () => this.onMouseUp());
        this.canvas.addEventListener('mouseleave', () => this.onMouseLeave());
        
        // 键盘事件
        document.addEventListener('keydown', (e) => this.onKeyDown(e));
        
        // 通行复选框
        document.getElementById('tilePassableCheck').addEventListener('change', (e) => {
          this.currentTile.attr = e.target.checked ? 0 : 1;
        });
      }
      
      // 渲染地图
      render() {
        this.ctx.save();
        this.ctx.scale(this.zoom, this.zoom);
        
        // 清空画布
        this.ctx.fillStyle = '#16213e';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // 绘制网格
        this.ctx.strokeStyle = '#2d3748';
        this.ctx.lineWidth = 0.5;
        
        for (let x = 0; x <= this.mapWidth; x++) {
          this.ctx.beginPath();
          this.ctx.moveTo(x * this.tileSize, 0);
          this.ctx.lineTo(x * this.tileSize, this.mapHeight * this.tileSize);
          this.ctx.stroke();
        }
        
        for (let y = 0; y <= this.mapHeight; y++) {
          this.ctx.beginPath();
          this.ctx.moveTo(0, y * this.tileSize);
          this.ctx.lineTo(this.mapWidth * this.tileSize, y * this.tileSize);
          this.ctx.stroke();
        }
        
        // 绘制瓦片
        for (let y = 0; y < this.mapHeight; y++) {
          for (let x = 0; x < this.mapWidth; x++) {
            const tile = this.tiles[y][x];
            this.drawTile(x, y, tile);
          }
        }
        
        this.ctx.restore();
      }
      
      // 绘制单个瓦片
      drawTile(x, y, tile) {
        const tileType = this.tileTypes.find(t => t.low === tile.low && t.high === tile.high);
        const color = tileType ? tileType.color : '#ff00ff';
        
        // 调试：打印未找到的瓦片
        if (!tileType) {
          console.log('未找到瓦片类型:', tile, '可用类型:', this.tileTypes.map(t => ({low: t.low, high: t.high, name: t.name})));
        }
        
        const px = x * this.tileSize;
        const py = y * this.tileSize;
        
        this.ctx.fillStyle = color;
        this.ctx.fillRect(px + 1, py + 1, this.tileSize - 2, this.tileSize - 2);
        
        // 绘制通行/阻挡标记
        if (tile.attr === 1) {
          this.ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
          this.ctx.fillRect(px + 1, py + 1, this.tileSize - 2, this.tileSize - 2);
          
          // X标记
          this.ctx.strokeStyle = '#ff0000';
          this.ctx.lineWidth = 2;
          this.ctx.beginPath();
          this.ctx.moveTo(px + 6, py + 6);
          this.ctx.lineTo(px + this.tileSize - 6, py + this.tileSize - 6);
          this.ctx.moveTo(px + this.tileSize - 6, py + 6);
          this.ctx.lineTo(px + 6, py + this.tileSize - 6);
          this.ctx.stroke();
        }
      }
      
      // 获取鼠标位置对应的瓦片坐标
      getTilePos(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / this.tileSize / this.zoom);
        const y = Math.floor((e.clientY - rect.top) / this.tileSize / this.zoom);
        return { x, y };
      }
      
      // 鼠标按下
      onMouseDown(e) {
        const { x, y } = this.getTilePos(e);
        if (x < 0 || y < 0 || x >= this.mapWidth || y >= this.mapHeight) return;
        
        this.isDrawing = true;
        this.lastX = x;
        this.lastY = y;
        
        console.log('鼠标按下, 工具:', this.currentTool, '当前瓦片:', this.currentTile);
        
        if (this.currentTool === 'pen') {
          this.setTile(x, y, { low: this.currentTile.low, high: this.currentTile.high, attr: this.currentTile.attr });
          this.render();
        } else if (this.currentTool === 'eraser') {
          const tileType = this.tileTypes[0]; // 草地
          this.setTile(x, y, { low: tileType.low, high: tileType.high, attr: tileType.attr });
          this.render();
        } else if (this.currentTool === 'fill') {
          this.floodFill(x, y, { ...this.currentTile });
          this.render();
        }
      }
      
      // 鼠标移动
      onMouseMove(e) {
        const { x, y } = this.getTilePos(e);
        
        // 更新状态栏
        document.getElementById('statusPos').textContent = `${x}, ${y}`;
        
        if (!this.isDrawing) return;
        if (x < 0 || y < 0 || x >= this.mapWidth || y >= this.mapHeight) return;
        
        if (this.currentTool === 'pen' && (x !== this.lastX || y !== this.lastY)) {
          // 绘制线段
          this.drawLine(this.lastX, this.lastY, x, y, { ...this.currentTile });
          this.lastX = x;
          this.lastY = y;
          this.render();
        } else if (this.currentTool === 'eraser' && (x !== this.lastX || y !== this.lastY)) {
          const tileType = this.tileTypes[0];
          this.drawLine(this.lastX, this.lastY, x, y, { low: tileType.low, high: tileType.high, attr: tileType.attr });
          this.lastX = x;
          this.lastY = y;
          this.render();
        }
      }
      
      // 鼠标释放
      onMouseUp() {
        if (this.isDrawing) {
          this.saveHistory();
          this.isDrawing = false;
        }
      }
      
      // 鼠标离开
      onMouseLeave() {
        this.onMouseUp();
      }
      
      // 键盘按下
      onKeyDown(e) {
        if (e.ctrlKey && e.key === 'z') {
          e.preventDefault();
          this.undo();
        } else if (e.ctrlKey && e.key === 'y') {
          e.preventDefault();
          this.redo();
        } else if (e.key === 'b') {
          this.setTool('pen');
        } else if (e.key === 'e') {
          this.setTool('eraser');
        } else if (e.key === 'g') {
          this.setTool('fill');
        } else if (e.key === 's') {
          this.setTool('select');
        }
      }
      
      // 设置瓦片
      setTile(x, y, tile) {
        if (x >= 0 && y >= 0 && x < this.mapWidth && y < this.mapHeight) {
          this.tiles[y][x] = tile;
          this.isModified = true;
          document.getElementById('statusModified').textContent = '是';
        }
      }
      
      // 绘制线段 (Bresenham)
      drawLine(x0, y0, x1, y1, tile) {
        const dx = Math.abs(x1 - x0);
        const dy = Math.abs(y1 - y0);
        const sx = x0 < x1 ? 1 : -1;
        const sy = y0 < y1 ? 1 : -1;
        let err = dx - dy;
        
        while (true) {
          this.setTile(x0, y0, { ...tile });
          
          if (x0 === x1 && y0 === y1) break;
          
          const e2 = 2 * err;
          if (e2 > -dy) {
            err -= dy;
            x0 += sx;
          }
          if (e2 < dx) {
            err += dx;
            y0 += sy;
          }
        }
      }
      
      // 洪水填充
      floodFill(x, y, newTile) {
        const targetTile = { ...this.tiles[y][x] };
        if (targetTile.low === newTile.low && targetTile.high === newTile.high && targetTile.attr === newTile.attr) {
          return;
        }
        
        const stack = [{ x, y }];
        const visited = new Set();
        
        while (stack.length > 0) {
          const { x, y } = stack.pop();
          const key = `${x},${y}`;
          
          if (visited.has(key)) continue;
          if (x < 0 || y < 0 || x >= this.mapWidth || y >= this.mapHeight) continue;
          
          const tile = this.tiles[y][x];
          if (tile.low !== targetTile.low || tile.high !== targetTile.high || tile.attr !== targetTile.attr) continue;
          
          visited.add(key);
          this.setTile(x, y, { ...newTile });
          
          stack.push({ x: x + 1, y });
          stack.push({ x: x - 1, y });
          stack.push({ x, y: y + 1 });
          stack.push({ x, y: y - 1 });
        }
      }
      
      // 设置工具
      setTool(tool) {
        this.currentTool = tool;
        
        document.querySelectorAll('#toolbar .toolbar-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn' + tool.charAt(0).toUpperCase() + tool.slice(1)).classList.add('active');
        
        document.getElementById('statusTool').textContent = 
          tool === 'pen' ? '画笔' : 
          tool === 'eraser' ? '橡皮擦' : 
          tool === 'fill' ? '填充' : '选择';
      }
      
      // 设置缩放
      setZoom(z) {
        this.zoom = Math.max(0.25, Math.min(4, z));
        document.getElementById('zoomValue').textContent = Math.round(this.zoom * 100) + '%';
        this.canvas.style.transform = `scale(${this.zoom})`;
        this.canvas.style.transformOrigin = 'center center';
      }
      
      // 根据类型设置当前瓦片
      setTileByType(index) {
        if (index >= 0 && index < this.tileTypes.length) {
          const tile = this.tileTypes[index];
          this.currentTile = { low: tile.low, high: tile.high, attr: tile.attr };
          this.updateTileInfo();
          
          // 选中的瓦片高亮
          document.querySelectorAll('.palette-tile').forEach((t, i) => {
            t.classList.toggle('selected', i === index);
          });
        }
      }
      
      // 更新瓦片信息
      updateTileInfo() {
        const tileType = this.tileTypes.find(t => t.low === this.currentTile.low && t.high === this.currentTile.high);
        document.getElementById('currentTile').textContent = tileType ? `${tileType.name} (${this.currentTile.low},${this.currentTile.high})` : `(${this.currentTile.low},${this.currentTile.high})`;
        document.getElementById('tilePassable').textContent = this.currentTile.attr === 0 ? '是' : '否';
        document.getElementById('tilePassableCheck').checked = this.currentTile.attr === 0;
      }
      
      // 调整地图大小
      resizeMap() {
        const newWidth = parseInt(document.getElementById('mapWidth').value) || 20;
        const newHeight = parseInt(document.getElementById('mapHeight').value) || 15;
        
        const newTiles = [];
        for (let y = 0; y < newHeight; y++) {
          const row = [];
          for (let x = 0; x < newWidth; x++) {
            if (y < this.mapHeight && x < this.mapWidth) {
              row.push({ ...this.tiles[y][x] });
            } else {
              row.push({ low: 1, high: 0, attr: 0 });
            }
          }
          newTiles.push(row);
        }
        
        this.mapWidth = newWidth;
        this.mapHeight = newHeight;
        this.tiles = newTiles;
        
        this.canvas.width = this.mapWidth * this.tileSize;
        this.canvas.height = this.mapHeight * this.tileSize;
        
        document.getElementById('statusSize').textContent = `${this.mapWidth} x ${this.mapHeight}`;
        this.saveHistory();
        this.render();
      }
      
      // 新建地图
      newMap() {
        if (this.isModified && !confirm('当前地图有未保存的修改，确定要新建吗？')) return;
        
        this.mapWidth = 20;
        this.mapHeight = 15;
        document.getElementById('mapWidth').value = this.mapWidth;
        document.getElementById('mapHeight').value = this.mapHeight;
        
        this.initMap();
        this.canvas.width = this.mapWidth * this.tileSize;
        this.canvas.height = this.mapHeight * this.tileSize;
        
        this.isModified = false;
        document.getElementById('statusModified').textContent = '否';
        document.getElementById('statusSize').textContent = `${this.mapWidth} x ${this.mapHeight}`;
        this.render();
      }
      
      // 打开地图
      openMap() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.map,.json';
        
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              if (file.name.endsWith('.json')) {
                this.loadFromJson(evt.target.result);
              } else {
                this.loadFromBinary(evt.target.result);
              }
            } catch (err) {
              alert('地图加载失败: ' + err.message);
            }
          };
          reader.readAsArrayBuffer(file);
        };
        
        input.click();
      }
      
      // 从二进制加载
      loadFromBinary(buffer) {
        const view = new DataView(buffer);
        let offset = 128;
        
        if (offset >= buffer.byteLength) throw new Error('文件太小');
        
        this.mapWidth = view.getUint16(offset, true);
        offset += 2;
        this.mapHeight = view.getUint16(offset, true);
        offset += 2;
        
        document.getElementById('mapWidth').value = this.mapWidth;
        document.getElementById('mapHeight').value = this.mapHeight;
        
        this.tiles = [];
        for (let y = 0; y < this.mapHeight; y++) {
          const row = [];
          for (let x = 0; x < this.mapWidth; x++) {
            if (offset + 3 > buffer.byteLength) break;
            const low = view.getUint8(offset++);
            const high = view.getUint8(offset++);
            const attr = view.getUint8(offset++);
            row.push({ low, high, attr });
          }
          this.tiles.push(row);
        }
        
        this.canvas.width = this.mapWidth * this.tileSize;
        this.canvas.height = this.mapHeight * this.tileSize;
        
        this.isModified = false;
        document.getElementById('statusModified').textContent = '否';
        document.getElementById('statusSize').textContent = `${this.mapWidth} x ${this.mapHeight}`;
        this.saveHistory();
        this.render();
      }
      
      // 从JSON加载
      loadFromJson(jsonStr) {
        const data = JSON.parse(jsonStr);
        
        this.mapWidth = data.width || 20;
        this.mapHeight = data.height || 15;
        document.getElementById('mapWidth').value = this.mapWidth;
        document.getElementById('mapHeight').value = this.mapHeight;
        document.getElementById('mapId').value = data.id || 1;
        document.getElementById('mapName').value = data.name || '';
        
        this.tiles = [];
        for (let y = 0; y < this.mapHeight; y++) {
          const row = [];
          for (let x = 0; x < this.mapWidth; x++) {
            const tile = data.tiles ? data.tiles[y] ? data.tiles[y][x] : null : null;
            if (tile) {
              row.push({ low: tile.low || 1, high: tile.high || 0, attr: tile.attr || 0 });
            } else {
              row.push({ low: 1, high: 0, attr: 0 });
            }
          }
          this.tiles.push(row);
        }
        
        this.canvas.width = this.mapWidth * this.tileSize;
        this.canvas.height = this.mapHeight * this.tileSize;
        
        this.isModified = false;
        document.getElementById('statusModified').textContent = '否';
        document.getElementById('statusSize').textContent = `${this.mapWidth} x ${this.mapHeight}`;
        this.saveHistory();
        this.render();
      }
      
      // 保存地图
      saveMap() {
        const mapId = document.getElementById('mapId').value;
        const mapName = document.getElementById('mapName').value;
        
        const mapData = {
          id: parseInt(mapId) || 1,
          name: mapName || '未命名',
          width: this.mapWidth,
          height: this.mapHeight,
          tiles: this.tiles
        };
        
        const blob = new Blob([JSON.stringify(mapData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `${String(mapId).padStart(3, '0')}_${mapName || 'map'}.json`;
        a.click();
        
        URL.revokeObjectURL(url);
        
        this.isModified = false;
        document.getElementById('statusModified').textContent = '否';
      }
      
      // 导出二进制格式
      exportBinary() {
        const headerSize = 128;
        const tileSize = 3;
        const buffer = new ArrayBuffer(headerSize + 2 + 2 + this.mapWidth * this.mapHeight * tileSize);
        const view = new Uint8Array(buffer);
        
        // 写入文件头
        const header = 'MAPFILE';
        for (let i = 0; i < header.length; i++) {
          view[i] = header.charCodeAt(i);
        }
        
        // 写入宽高到头部的特定位置
        view[headerSize - 4] = this.mapWidth & 0xff;
        view[headerSize - 3] = (this.mapWidth >> 8) & 0xff;
        view[headerSize - 2] = this.mapHeight & 0xff;
        view[headerSize - 1] = (this.mapHeight >> 8) & 0xff;
        
        // 写入宽高
        view[headerSize] = this.mapWidth & 0xff;
        view[headerSize + 1] = (this.mapWidth >> 8) & 0xff;
        view[headerSize + 2] = this.mapHeight & 0xff;
        view[headerSize + 3] = (this.mapHeight >> 8) & 0xff;
        
        // 写入瓦片数据
        let offset = headerSize + 4;
        for (let y = 0; y < this.mapHeight; y++) {
          for (let x = 0; x < this.mapWidth; x++) {
            const tile = this.tiles[y][x];
            view[offset++] = tile.low;
            view[offset++] = tile.high;
            view[offset++] = tile.attr;
          }
        }
        
        const blob = new Blob([buffer]);
        const url = URL.createObjectURL(blob);
        
        const mapId = document.getElementById('mapId').value;
        const a = document.createElement('a');
        a.href = url;
        a.download = `${String(mapId).padStart(3, '0')}.map`;
        a.click();
        
        URL.revokeObjectURL(url);
      }
      
      // 导出JSON格式
      exportJson() {
        this.saveMap();
      }
      
      // 保存历史
      saveHistory() {
        // 移除当前位置之后的历史
        this.history = this.history.slice(0, this.historyIndex + 1);
        
        // 添加新历史
        const state = JSON.parse(JSON.stringify(this.tiles));
        this.history.push(state);
        
        // 限制历史数量
        if (this.history.length > this.maxHistory) {
          this.history.shift();
        } else {
          this.historyIndex++;
        }
      }
      
      // 撤销
      undo() {
        if (this.historyIndex > 0) {
          this.historyIndex--;
          this.tiles = JSON.parse(JSON.stringify(this.history[this.historyIndex]));
          this.render();
        }
      }
      
      // 重做
      redo() {
        if (this.historyIndex < this.history.length - 1) {
          this.historyIndex++;
          this.tiles = JSON.parse(JSON.stringify(this.history[this.historyIndex]));
          this.render();
        }
      }
    }
    
    // 启动编辑器
    window.addEventListener('DOMContentLoaded', () => {
      window.mapEditor = new MapEditor();
    });
  </script>
