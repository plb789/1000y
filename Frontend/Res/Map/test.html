<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MapEditor Test</title>
</head>
<body>
    <h1>MapEditor 语法检查测试</h1>
    <div id="testResult"></div>

    <script>
        // 简单的语法检查
        try {
            // 检查是否能读取MapEditor.html
            const testDiv = document.getElementById('testResult');
            testDiv.innerHTML = '<p style="color: green;">✅ 测试页面加载成功</p>';
            testDiv.innerHTML += '<p>请打开浏览器开发者工具(F12)查看控制台是否有错误</p>';
            console.log('✅ 基本JavaScript功能正常');
        } catch (error) {
            document.getElementById('testResult').innerHTML = `<p style="color: red;">❌ 错误: ${error.message}</p>`;
            console.error('错误:', error);
        }
    </script>
</body>
</html>
